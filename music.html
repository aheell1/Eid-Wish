<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nephophile</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0B1026;
      --gold: #F6C453;
      --cloud: rgba(82, 90, 120, 0.38);
      --cloud-light: rgba(115, 123, 150, 0.42);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(246, 196, 83, 0.08), transparent 30%),
        linear-gradient(to bottom, #050817, #0B1026 55%, #111936);
      font-family: "Poppins", sans-serif;
      color: white;
      position: relative;
    }

.cloud {
  position: absolute;
  width: 260px;
  height: 82px;
  background:
    radial-gradient(circle at 25% 35%, rgba(150, 158, 185, 0.45), transparent 34%),
    radial-gradient(circle at 55% 15%, rgba(125, 135, 165, 0.48), transparent 40%),
    radial-gradient(circle at 80% 45%, rgba(70, 78, 108, 0.48), transparent 38%),
    rgba(55, 63, 92, 0.48);
  border-radius: 70px;
  filter: blur(0.8px);
  box-shadow:
    inset -28px -24px 40px rgba(0, 0, 0, 0.38),
    inset 14px 12px 26px rgba(255, 255, 255, 0.06),
    0 0 38px rgba(255, 255, 255, 0.04);
  animation: moveClouds linear infinite;
  z-index: 1;
}

.cloud::before,
.cloud::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 30%, rgba(145, 153, 180, 0.5), rgba(62, 70, 100, 0.45));
  box-shadow: inset -16px -16px 25px rgba(0, 0, 0, 0.28);
}

.cloud::before {
  width: 95px;
  height: 95px;
  top: -42px;
  left: 42px;
}

.cloud::after {
  width: 125px;
  height: 125px;
  top: -62px;
  right: 28px;
}

.c1 {
  top: 85px;
  left: -80px;
  animation-duration: 24s;
}

.c2 {
  top: 175px;
  left: -160px;
  transform: scale(0.78);
  animation-duration: 30s;
  animation-delay: 2s;
}

.c3 {
  top: 305px;
  left: -120px;
  transform: scale(0.58);
  animation-duration: 26s;
  animation-delay: 4s;
}

.c4 {
  top: 135px;
  left: -220px;
  transform: scale(0.62);
  animation-duration: 34s;
  animation-delay: 5s;
}

.c5 {
  top: 410px;
  left: -180px;
  transform: scale(0.86);
  animation-duration: 36s;
  animation-delay: 3s;
}

.c6 {
  top: 505px;
  left: -130px;
  transform: scale(0.52);
  animation-duration: 28s;
  animation-delay: 6s;
}

.c7 {
  top: 35px;
  left: -200px;
  transform: scale(0.5);
  animation-duration: 38s;
  animation-delay: 1s;
  opacity: 0.75;
}

@keyframes moveClouds {
  from {
    translate: 0 0;
  }

  to {
    translate: calc(100vw + 420px) 0;
  }
}

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.35;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.5);
      }
    }

    @keyframes beat {
      0%, 100% { height: 12px; }
      50% { height: 42px; }
    }

    @keyframes fly {
      0%, 100% {
        transform: translate(0, 0);
        opacity: 0.25;
      }
      50% {
        transform: translate(35px, -45px);
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      .card {
        transform: translateY(-45px);
      }

      h1 {
        font-size: clamp(3.2rem, 15vw, 4.5rem);
      }

      .glass {
        width: min(90%, 330px);
        padding: 24px 18px;
      }

      .next-btn {
        bottom: 70px;
        font-size: 0.85rem;
      }

      .cloud {
        width: 190px;
        height: 62px;
      }

      .cloud::before {
        width: 72px;
        height: 72px;
        top: -30px;
      }

      .cloud::after {
        width: 90px;
        height: 90px;
        top: -45px;
      }
    }
  </style>
</head>

<body>

  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="cloud c4"></div>
  <div class="cloud c5"></div>
  <div class="cloud c6"></div>
  <div class="cloud c7"></div>

  <div class="fairy-lights" id="lights"></div>

  <main class="card">
    <h1>Nephophile</h1>

    <div class="glass">
      <p class="typing" id="typing"></p>

      <button class="play-btn" onclick="toggleMusic()" id="playBtn">
        Play Song 🎵
      </button>

      <div class="equalizer" id="equalizer">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </div>
  </main>

  <a href="#" class="next-btn">Next ➜</a>

  <audio id="song">
    <source src="song1.mp3" type="audio/mpeg">
  </audio>

  <script>
    const text = "For the one who loves clouds, calm skies, and little peaceful moments.";
    const typing = document.getElementById("typing");
    let index = 0;

    function typeText() {
      if (index < text.length) {
        typing.innerHTML += text.charAt(index);
        index++;
        setTimeout(typeText, 55);
      }
    }

    typeText();

    const song = document.getElementById("song");
    const btn = document.getElementById("playBtn");
    const eq = document.getElementById("equalizer");

    function toggleMusic() {
      if (song.paused) {
        song.play();
        btn.innerHTML = "Pause Song ❚❚";
        eq.classList.add("playing");
      } else {
        song.pause();
        btn.innerHTML = "Play Song 🎵";
        eq.classList.remove("playing");
      }
    }

    song.addEventListener("ended", () => {
      btn.innerHTML = "Play Again 🎵";
      eq.classList.remove("playing");
    });

    const lights = document.getElementById("lights");

    for (let i = 0; i < 13; i++) {
      const light = document.createElement("span");
      light.className = "light";
      light.style.left = (i * 8 + 3) + "%";
      light.style.animationDelay = Math.random() * 2 + "s";
      lights.appendChild(light);
    }

    for (let i = 0; i < 22; i++) {
      const firefly = document.createElement("span");
      firefly.className = "firefly";
      firefly.style.left = Math.random() * 100 + "vw";
      firefly.style.top = Math.random() * 100 + "vh";
      firefly.style.animationDelay = Math.random() * 5 + "s";
      document.body.appendChild(firefly);
    }
  </script>

</body>
</html>
