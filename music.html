<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nephophile</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0B1026;
      --gold: #F6C453;
      --cloud: rgba(82, 90, 120, 0.38);
      --cloud-light: rgba(115, 123, 150, 0.42);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(246, 196, 83, 0.08), transparent 30%),
        linear-gradient(to bottom, #050817, #0B1026 55%, #111936);
      font-family: "Poppins", sans-serif;
      color: white;
      position: relative;
    }

    .cloud {
      position: absolute;
      width: 230px;
      height: 75px;
      background: var(--cloud);
      border-radius: 60px;
      filter: blur(0.4px);
      box-shadow:
        inset -22px -20px 35px rgba(0, 0, 0, 0.28),
        inset 12px 10px 25px rgba(255, 255, 255, 0.06),
        0 0 35px rgba(255, 255, 255, 0.04);
      animation: moveClouds linear infinite;
      z-index: 1;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: var(--cloud-light);
      border-radius: 50%;
      box-shadow: inset -12px -12px 22px rgba(0, 0, 0, 0.2);
    }

    .cloud::before {
      width: 90px;
      height: 90px;
      top: -38px;
      left: 38px;
    }

    .cloud::after {
      width: 115px;
      height: 115px;
      top: -58px;
      right: 25px;
    }

    .c1 {
      top: 95px;
      left: -280px;
      animation-duration: 45s;
    }

    .c2 {
      top: 190px;
      left: -330px;
      transform: scale(0.78);
      animation-duration: 58s;
      animation-delay: 7s;
    }

    .c3 {
      top: 315px;
      left: -300px;
      transform: scale(0.58);
      animation-duration: 50s;
      animation-delay: 15s;
    }

    .c4 {
      top: 145px;
      left: -270px;
      transform: scale(0.62);
      animation-duration: 62s;
      animation-delay: 22s;
    }

    .c5 {
      top: 420px;
      left: -350px;
      transform: scale(0.86);
      animation-duration: 66s;
      animation-delay: 12s;
    }

    .c6 {
      top: 520px;
      left: -280px;
      transform: scale(0.52);
      animation-duration: 52s;
      animation-delay: 28s;
    }

    .c7 {
      top: 35px;
      left: -320px;
      transform: scale(0.5);
      animation-duration: 70s;
      animation-delay: 18s;
      opacity: 0.7;
    }

    .fairy-lights {
      position: fixed;
      top: 0;
      width: 100%;
      height: 88px;
      z-index: 3;
    }

    .light {
      position: absolute;
      top: 22px;
      width: 7px;
      height: 7px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--gold);
      animation: twinkle 2s ease-in-out infinite;
    }

    .light::before {
      content: "";
      position: absolute;
      top: -22px;
      left: 3px;
      width: 1px;
      height: 22px;
      background: rgba(246, 196, 83, 0.4);
    }

    .card {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      transform: translateY(-25px);
    }

    h1 {
      font-family: "Great Vibes", cursive;
      font-size: clamp(3.4rem, 12vw, 6.3rem);
      color: var(--gold);
      font-weight: 400;
      text-shadow: 0 0 24px rgba(246, 196, 83, 0.85);
      margin-bottom: 18px;
    }

    .glass {
      width: min(90%, 370px);
      padding: 28px 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.075);
      border: 1.5px solid rgba(246, 196, 83, 0.34);
      box-shadow:
        0 0 28px rgba(246, 196, 83, 0.16),
        0 22px 48px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(10px);
    }

    .typing {
      font-size: 1rem;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.92);
      min-height: 58px;
    }

    .play-btn {
      margin-top: 22px;
      padding: 10px 24px;
      border: 1.5px solid var(--gold);
      border-radius: 22px;
      background: rgba(246, 196, 83, 0.14);
      color: var(--gold);
      font-family: "Amiri", serif;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(246, 196, 83, 0.35);
      transition: 0.3s ease;
    }

    .play-btn:hover {
      background: var(--gold);
      color: var(--bg);
      transform: scale(1.05);
    }

    .equalizer {
      height: 45px;
      margin-top: 24px;
      display: flex;
      gap: 6px;
      align-items: end;
      justify-content: center;
    }

    .bar {
      width: 6px;
      height: 12px;
      background: var(--gold);
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(246, 196, 83, 0.6);
      animation: beat 0.8s ease-in-out infinite;
      animation-play-state: paused;
    }

    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.3s; }
    .bar:nth-child(5) { animation-delay: 0.4s; }

    .playing .bar {
      animation-play-state: running;
    }

    .firefly {
      position: absolute;
      width: 5px;
      height: 5px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 14px var(--gold);
      opacity: 0.7;
      animation: fly 8s ease-in-out infinite;
      z-index: 2;
    }

    .next-btn {
      position: fixed;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      border: 1.5px solid var(--gold);
      border-radius: 18px;
      background: rgba(246, 196, 83, 0.12);
      color: var(--gold);
      font-family: "Amiri", serif;
      font-size: 0.95rem;
      text-decoration: none;
      z-index: 10;
    }

    @keyframes moveClouds {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(calc(100vw + 620px));
      }
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.35;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.5);
      }
    }

    @keyframes beat {
      0%, 100% { height: 12px; }
      50% { height: 42px; }
    }

    @keyframes fly {
      0%, 100% {
        transform: translate(0, 0);
        opacity: 0.25;
      }
      50% {
        transform: translate(35px, -45px);
        opacity: 1;
      }
    }

    @media (max-width: 600px) {
      .card {
        transform: translateY(-45px);
      }

      h1 {
        font-size: clamp(3.2rem, 15vw, 4.5rem);
      }

      .glass {
        width: min(90%, 330px);
        padding: 24px 18px;
      }

      .next-btn {
        bottom: 70px;
        font-size: 0.85rem;
      }

      .cloud {
        width: 190px;
        height: 62px;
      }

      .cloud::before {
        width: 72px;
        height: 72px;
        top: -30px;
      }

      .cloud::after {
        width: 90px;
        height: 90px;
        top: -45px;
      }
    }
  </style>
</head>

<body>

  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="cloud c4"></div>
  <div class="cloud c5"></div>
  <div class="cloud c6"></div>
  <div class="cloud c7"></div>

  <div class="fairy-lights" id="lights"></div>

  <main class="card">
    <h1>Nephophile</h1>

    <div class="glass">
      <p class="typing" id="typing"></p>

      <button class="play-btn" onclick="toggleMusic()" id="playBtn">
        Play Song 🎵
      </button>

      <div class="equalizer" id="equalizer">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </div>
  </main>

  <a href="#" class="next-btn">Next ➜</a>

  <audio id="song">
    <source src="song1.mp3" type="audio/mpeg">
  </audio>

  <script>
    const text = "For the one who loves clouds, calm skies, and little peaceful moments.";
    const typing = document.getElementById("typing");
    let index = 0;

    function typeText() {
      if (index < text.length) {
        typing.innerHTML += text.charAt(index);
        index++;
        setTimeout(typeText, 55);
      }
    }

    typeText();

    const song = document.getElementById("song");
    const btn = document.getElementById("playBtn");
    const eq = document.getElementById("equalizer");

    function toggleMusic() {
      if (song.paused) {
        song.play();
        btn.innerHTML = "Pause Song ❚❚";
        eq.classList.add("playing");
      } else {
        song.pause();
        btn.innerHTML = "Play Song 🎵";
        eq.classList.remove("playing");
      }
    }

    song.addEventListener("ended", () => {
      btn.innerHTML = "Play Again 🎵";
      eq.classList.remove("playing");
    });

    const lights = document.getElementById("lights");

    for (let i = 0; i < 13; i++) {
      const light = document.createElement("span");
      light.className = "light";
      light.style.left = (i * 8 + 3) + "%";
      light.style.animationDelay = Math.random() * 2 + "s";
      lights.appendChild(light);
    }

    for (let i = 0; i < 22; i++) {
      const firefly = document.createElement("span");
      firefly.className = "firefly";
      firefly.style.left = Math.random() * 100 + "vw";
      firefly.style.top = Math.random() * 100 + "vh";
      firefly.style.animationDelay = Math.random() * 5 + "s";
      document.body.appendChild(firefly);
    }
  </script>

</body>
</html>
