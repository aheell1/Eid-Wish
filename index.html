<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid Mubarak</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

  <style>

    :root {
      --bg: #080d1f;
      --gold: #F6C453;
      --gold-dim: rgba(246,196,83,0.55);
      --gold-faint: rgba(246,196,83,0.12);
      --white: #f0ead6;
    }

    *, *::before, *::after {
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      font-family: sans-serif;
      cursor: default;
    }

    .sky {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #1a1040 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 20%, #0d1a3a 0%, transparent 60%),
        #080d1f;
      z-index: 0;
    }

    .nebula {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .nebula::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(120,80,200,0.13) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse-nebula 8s ease-in-out infinite alternate;
    }

    .nebula::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 300px;
      bottom: 0;
      right: -100px;
      background: radial-gradient(ellipse, rgba(246,196,83,0.07) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse-nebula 10s ease-in-out infinite alternate-reverse;
    }

    @keyframes pulse-nebula {
      from { opacity: 0.5; transform: translateX(-50%) scale(1); }
      to   { opacity: 1; transform: translateX(-50%) scale(1.15); }
    }

    #starfield {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .moon-wrap {
      position: fixed;
      right: 8%;
      top: 12%;
      z-index: 6;
      animation: moon-float 9s ease-in-out infinite alternate;
    }

    @keyframes moon-float {
      from { transform: translateY(0px); }
      to   { transform: translateY(-14px); }
    }

    .moon {
      width: 130px;
      height: 130px;
      background: radial-gradient(circle at 38% 32%, #f5f0e0 0%, #d4cdb5 35%, #a09880 100%);
      border-radius: 50%;
      box-shadow:
        -38px 0 0 var(--bg) inset,
        0 0 60px rgba(240,225,170,0.22),
        0 0 120px rgba(240,225,170,0.1);
      position: relative;
      overflow: hidden;
    }

    .crater {
      position: absolute;
      background: rgba(100,95,80,0.28);
      border-radius: 50%;
    }

    .crater:nth-child(1){width:18px;height:18px;top:30px;left:52px;}
    .crater:nth-child(2){width:11px;height:11px;top:66px;left:76px;}
    .crater:nth-child(3){width:14px;height:14px;top:86px;left:42px;}
    .crater:nth-child(4){width:8px;height:8px;top:48px;left:38px;}

    .content {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
      padding: 0 24px;
      transform: translateY(-28px);
    }

    .arabic-main {
      font-family: "Amiri", serif;
      font-size: clamp(3rem, 8vw, 6rem);
      color: var(--gold);
      font-weight: 700;
      direction: rtl;
      text-shadow: 0 0 30px rgba(246,196,83,0.6);
    }

    .arabic-name {
      font-family: "Great Vibes", cursive;
      font-size: clamp(2.4rem, 6vw, 4.6rem);
      color: var(--white);
    }

    .subtitle {
      font-family: "Cormorant Garamond", serif;
      font-size: 0.9rem;
      color: var(--gold);
      margin-top: 20px;
      letter-spacing: 4px;
    }

    @keyframes fade-rise {
      from { opacity: 0; transform: translateX(-50%) translateY(18px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .password-wrapper {
      position: fixed;
      left: 50%;
      bottom: 38px;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      width: 100%;
      max-width: 340px;
      animation: fade-rise 1.2s ease forwards 2.4s;
    }

    .password-row {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(246,196,83,0.12);
      border: 1px solid rgba(246,196,83,0.5);
      border-radius: 40px;
      width: 100%;
      max-width: 300px;
    }

    .lock-icon {
      padding-left: 15px;
      color: var(--gold);
    }

    .password-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      text-align: center;
      color: var(--gold);
      font-family: "Amiri", serif;
    }

    .password-btn {
      background: rgba(246,196,83,0.18);
      border: none;
      padding: 11px 18px;
      cursor: pointer;
    }

    .error-msg {
      font-size: 0.8rem;
      color: rgba(255,140,130,0.95);
      opacity: 0;
      transition: 0.3s;
    }

    .error-msg.visible {
      opacity: 1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: 0.7s;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

  </style>
</head>

<body>

<div class="sky"></div>
<div class="nebula"></div>
<canvas id="starfield"></canvas>

<div class="moon-wrap">
  <div class="moon">
    <div class="crater"></div>
    <div class="crater"></div>
    <div class="crater"></div>
    <div class="crater"></div>
  </div>
</div>

<main class="content">
  <p class="arabic-main">عيد مبارك</p>
  <p class="arabic-name">نائلة</p>
  <p class="subtitle">A gift, just for you</p>
</main>

<div class="password-wrapper" id="pwWrapper">

  <div class="password-row">
    <span class="lock-icon">🔑</span>
    <input id="pwInput" class="password-input" type="password" placeholder="your secret key…" />
    <button id="pwBtn" class="password-btn">➜</button>
  </div>

  <div class="error-msg" id="errMsg">Wrong password ✨</div>

</div>

<div class="overlay" id="overlay"></div>

<script>
const PASSWORD = "Nailla25";
const NEXT_PAGE = "rose.html";

const pwInput = document.getElementById("pwInput");
const pwBtn = document.getElementById("pwBtn");
const errMsg = document.getElementById("errMsg");
const overlay = document.getElementById("overlay");

function check() {
  if (pwInput.value === PASSWORD) {
    overlay.classList.add("active");
    setTimeout(() => window.location.href = NEXT_PAGE, 700);
  } else {
    errMsg.classList.add("visible");
    pwInput.value = "";
  }
}

pwBtn.onclick = check;
pwInput.addEventListener("keydown", e => {
  if (e.key === "Enter") check();
});
</script>

</body>
</html>
