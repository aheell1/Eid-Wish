<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eid Mubarak</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#080d1f;
  --gold:#F6C453;
  --white:#f0ead6;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  overflow:hidden;
  background:var(--bg);
  font-family:sans-serif;
}

/* SKY */
.sky{
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, #1a1040 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 20%, #0d1a3a 0%, transparent 60%),
    #080d1f;
  z-index:0;
}

/* CANVAS STARS */
#starfield{
  position:fixed;
  inset:0;
  z-index:2;
}

/* MOON */
.moon-wrap{
  position:fixed;
  right:8%;
  top:12%;
  z-index:6;
  animation:floatMoon 7s ease-in-out infinite alternate;
}

@keyframes floatMoon{
  from{transform:translateY(0);}
  to{transform:translateY(-18px);}
}

.moon{
  width:130px;
  height:130px;
  background:radial-gradient(circle at 38% 32%, #f5f0e0 0%, #d4cdb5 35%, #a09880 100%);
  border-radius:50%;
  box-shadow:-38px 0 0 var(--bg) inset, 0 0 60px rgba(240,225,170,0.22);
  position:relative;
  overflow:hidden;
}

/* CRATERS */
.crater{
  position:absolute;
  background:rgba(100,95,80,0.28);
  border-radius:50%;
}

.crater:nth-child(1){width:18px;height:18px;top:30px;left:52px;}
.crater:nth-child(2){width:11px;height:11px;top:66px;left:76px;}
.crater:nth-child(3){width:14px;height:14px;top:86px;left:42px;}
.crater:nth-child(4){width:8px;height:8px;top:48px;left:38px;}

/* TEXT */
.content{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
  text-align:center;
  transform:translateY(-25px);
}

.arabic-main{
  font-family:"Amiri",serif;
  font-size:clamp(3rem,8vw,6rem);
  color:var(--gold);
  opacity:0;
  animation:fadeRise 1.2s ease forwards;
}

.arabic-name{
  font-family:"Great Vibes",cursive;
  font-size:clamp(2.4rem,6vw,4.6rem);
  color:var(--white);
  opacity:0;
  animation:fadeRise 1.8s ease forwards;
}

.subtitle{
  color:var(--gold);
  font-size:0.9rem;
  letter-spacing:4px;
  margin-top:18px;
  opacity:0;
  animation:fadeRise 2.2s ease forwards;
}

/* FADE ANIMATION */
@keyframes fadeRise{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}

/* PASSWORD */
.password-wrapper{
  position:fixed;
  left:50%;
  bottom:38px;
  transform:translateX(-50%);
  z-index:20;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:9px;
  width:100%;
  max-width:340px;
}

.password-row{
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(246,196,83,0.12);
  border:1px solid rgba(246,196,83,0.5);
  border-radius:40px;
  width:100%;
  max-width:300px;
}

.lock{
  padding-left:14px;
  color:var(--gold);
}

.password-input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  text-align:center;
  color:var(--gold);
  font-family:"Amiri",serif;
}

.password-btn{
  background:rgba(246,196,83,0.18);
  border:none;
  padding:11px 18px;
  cursor:pointer;
}

.error-msg{
  font-size:0.8rem;
  color:#ffb0b0;
  opacity:0;
  transition:0.3s;
}

.error-msg.visible{
  opacity:1;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:var(--bg);
  opacity:0;
  pointer-events:none;
  transition:0.7s;
  z-index:100;
}

.overlay.active{
  opacity:1;
  pointer-events:all;
}

/* SHOOTING STAR */
.shooting-star{
  position:fixed;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0;
  z-index:3;
}

</style>
</head>

<body>

<div class="sky"></div>
<canvas id="starfield"></canvas>

<div class="moon-wrap">
  <div class="moon">
    <div class="crater"></div>
    <div class="crater"></div>
    <div class="crater"></div>
    <div class="crater"></div>
  </div>
</div>

<main class="content">
  <p class="arabic-main">عيد مبارك</p>
  <p class="arabic-name">نائلة</p>
  <p class="subtitle">A gift, just for you</p>
</main>

<div class="password-wrapper">
  <div class="password-row">
    <span class="lock">🔑</span>
    <input id="pw" class="password-input" type="password" placeholder="secret key"/>
    <button class="password-btn" onclick="check()">➜</button>
  </div>
  <div id="err" class="error-msg">Wrong password ✨</div>
</div>

<div class="overlay" id="overlay"></div>

<script>

/* STAR CANVAS */
const c=document.getElementById("starfield");
const ctx=c.getContext("2d");
let w,h,stars=[];

function resize(){
  w=c.width=innerWidth;
  h=c.height=innerHeight;
}

function init(){
  stars=[];
  for(let i=0;i<140;i++){
    stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5});
  }
}

function draw(){
  ctx.clearRect(0,0,w,h);
  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.6)";
    ctx.fill();
  }
  requestAnimationFrame(draw);
}

resize();init();draw();
addEventListener("resize",()=>{resize();init();});

/* SHOOTING STARS */
function shoot(){
  const el=document.createElement("div");
  el.className="shooting-star";
  let x=Math.random()*innerWidth;
  let y=Math.random()*innerHeight*0.5;
  let len=120+Math.random()*120;

  el.style.left=x+"px";
  el.style.top=y+"px";
  el.style.width=len+"px";
  el.style.transform=`rotate(${20+Math.random()*30}deg)`;

  document.body.appendChild(el);

  setTimeout(()=>el.remove(),1000);
  setTimeout(shoot,2000+Math.random()*3000);
}

setTimeout(shoot,1500);

/* PASSWORD */
const PASS="Nailla25";
const NEXT="rose.html";

function check(){
  let val=document.getElementById("pw").value;
  let err=document.getElementById("err");
  let overlay=document.getElementById("overlay");

  if(val===PASS){
    overlay.classList.add("active");
    setTimeout(()=>location.href=NEXT,700);
  }else{
    err.classList.add("visible");
    setTimeout(()=>err.classList.remove("visible"),2000);
  }
}

</script>

</body>
</html>
