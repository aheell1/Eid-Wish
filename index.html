<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eid Mubarak</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#080d1f;
  --gold:#F6C453;
  --white:#f0ead6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow:hidden;
  background:var(--bg);
  font-family:sans-serif;
}

/* SKY + NEBULA (RESTORED ORIGINAL STYLE) */
.sky{
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, #1a1040 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 20%, #0d1a3a 0%, transparent 60%),
    #080d1f;
  z-index:0;
}

.nebula{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:
    radial-gradient(circle at 30% 20%, rgba(120,80,200,0.12), transparent 60%),
    radial-gradient(circle at 80% 80%, rgba(246,196,83,0.08), transparent 60%);
}

/* STAR CANVAS */
#starfield{
  position:fixed;
  inset:0;
  z-index:2;
}

/* MOON */
.moon-wrap{
  position:fixed;
  right:8%;
  top:12%;
  z-index:6;
  animation:moonFloat 8s ease-in-out infinite alternate;
}

@keyframes moonFloat{
  from{transform:translateY(0);}
  to{transform:translateY(-18px);}
}

.moon{
  width:130px;
  height:130px;
  background:radial-gradient(circle at 38% 32%, #f5f0e0 0%, #d4cdb5 35%, #a09880 100%);
  border-radius:50%;
  box-shadow:-38px 0 0 var(--bg) inset, 0 0 60px rgba(240,225,170,0.22);
  position:relative;
}

/* TEXT */
.content{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
  text-align:center;
  transform:translateY(-28px);
}

.arabic-main{
  font-family:"Amiri",serif;
  font-size:clamp(3rem,8vw,6rem);
  color:var(--gold);
  opacity:0;
  animation:fadeRise 1.2s ease forwards;
}

.arabic-name{
  font-family:"Great Vibes",cursive;
  font-size:clamp(2.4rem,6vw,4.6rem);
  color:var(--white);
  opacity:0;
  animation:fadeRise 1.8s ease forwards;
}

.subtitle{
  color:var(--gold);
  font-size:0.9rem;
  letter-spacing:4px;
  margin-top:18px;
  opacity:0;
  animation:fadeRise 2.2s ease forwards;
}

@keyframes fadeRise{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}

/* PASSWORD (FIXED + CLEAN + CENTERED LOOK) */
.password-wrapper{
  position:fixed;
  left:50%;
  bottom:38px;
  transform:translateX(-50%);
  z-index:20;
  width:100%;
  display:flex;
  justify-content:center;
  animation:fadeRise 2.4s ease forwards;
}

.password-box{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;

  width:280px;
  max-width:90vw;

  background:rgba(246,196,83,0.12);
  border:1px solid rgba(246,196,83,0.4);
  border-radius:50px;

  box-shadow:0 0 25px rgba(246,196,83,0.15);
}

/* unified input */
.password-input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  text-align:center;

  color:var(--gold);
  font-family:"Amiri",serif;
  font-size:1rem;
}

/* single clean button (no ugly split UI) */
.password-btn{
  background:rgba(246,196,83,0.18);
  border:none;
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:var(--gold);
  transition:0.2s;
}

.password-btn:hover{
  transform:scale(1.08);
  background:rgba(246,196,83,0.28);
}

/* ERROR */
.error-msg{
  margin-top:8px;
  font-size:0.8rem;
  color:#ffb0b0;
  opacity:0;
  transition:0.3s;
}

.error-msg.visible{
  opacity:1;
}

</style>
</head>

<body>

<div class="sky"></div>
<div class="nebula"></div>
<canvas id="starfield"></canvas>

<div class="moon-wrap">
  <div class="moon"></div>
</div>

<main class="content">
  <p class="arabic-main">عيد مبارك</p>
  <p class="arabic-name">نائلة</p>
  <p class="subtitle">A gift, just for you</p>
</main>

<div class="password-wrapper">
  <div>
    <div class="password-box">
      <input id="pw" class="password-input" type="password" placeholder="Enter secret key"/>
      <button class="password-btn" onclick="check()">➜</button>
    </div>
    <div id="err" class="error-msg">Wrong password ✨</div>
  </div>
</div>

<script>

/* STAR ANIMATION (RESTORED STYLE) */
const canvas=document.getElementById("starfield");
const ctx=canvas.getContext("2d");

let w,h,stars=[];

function resize(){
  w=canvas.width=innerWidth;
  h=canvas.height=innerHeight;
}

function init(){
  stars=[];
  for(let i=0;i<150;i++){
    stars.push({
      x:Math.random()*w,
      y:Math.random()*h,
      r:Math.random()*1.4
    });
  }
}

function draw(){
  ctx.clearRect(0,0,w,h);
  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.6)";
    ctx.fill();
  }
  requestAnimationFrame(draw);
}

resize();
init();
draw();
window.addEventListener("resize",()=>{resize();init();});

/* PASSWORD */
const PASS="Nailla25";
const NEXT="rose.html";

function check(){
  let val=document.getElementById("pw").value;
  let err=document.getElementById("err");

  if(val===PASS){
    window.location.href=NEXT;
  }else{
    err.classList.add("visible");
    setTimeout(()=>err.classList.remove("visible"),2000);
  }
}

</script>

</body>
</html>
