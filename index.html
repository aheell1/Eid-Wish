<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid Mubarak</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --background-color: #0B1026;
      --contrast-color: #F6C453;
      --grey-color: #C9C9C9;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: var(--background-color);
      position: relative;
      font-family: sans-serif;
    }

    .content {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 5;
      padding: 0 20px;
      transform: translateY(-35px);
    }

    .arabic-main {
      font-family: "Amiri", serif;
      font-size: clamp(2.6rem, 7vw, 5.2rem);
      color: var(--contrast-color);
      font-weight: 700;
      text-shadow: 0 0 20px rgba(246, 196, 83, 0.7);
      line-height: 1.3;
      direction: rtl;
    }

    .arabic-name {
      font-family: "Great Vibes", cursive;
      font-size: clamp(2.2rem, 5.5vw, 4rem);
      color: var(--contrast-color);
      margin-top: 10px;
      opacity: 0.88;
      text-shadow: 0 0 14px rgba(246, 196, 83, 0.5);
      direction: rtl;
      font-weight: 400;
    }

    /* ── Password Box ── */
    .password-wrapper {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .password-label {
      font-family: "Amiri", serif;
      font-size: 0.78rem;
      color: rgba(246, 196, 83, 0.55);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .password-row {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1.5px solid rgba(246, 196, 83, 0.45);
      border-radius: 22px;
      overflow: hidden;
      background: rgba(246, 196, 83, 0.07);
      box-shadow: 0 0 18px rgba(246, 196, 83, 0.18);
      transition: box-shadow 0.3s ease;
    }

    .password-row:focus-within {
      box-shadow: 0 0 28px rgba(246, 196, 83, 0.45);
      border-color: rgba(246, 196, 83, 0.75);
    }

    .password-input {
      background: transparent;
      border: none;
      outline: none;
      padding: 9px 16px;
      font-family: "Amiri", serif;
      font-size: 1rem;
      color: var(--contrast-color);
      width: 160px;
      letter-spacing: 1px;
    }

    .password-input::placeholder {
      color: rgba(246, 196, 83, 0.38);
      font-size: 0.88rem;
      letter-spacing: 0.5px;
    }

    .password-btn {
      background: rgba(246, 196, 83, 0.15);
      border: none;
      border-left: 1px solid rgba(246, 196, 83, 0.3);
      color: var(--contrast-color);
      padding: 9px 15px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.25s ease;
      display: flex;
      align-items: center;
    }

    .password-btn:hover {
      background: rgba(246, 196, 83, 0.32);
    }

    .error-msg {
      font-family: "Amiri", serif;
      font-size: 0.8rem;
      color: #e07070;
      opacity: 0;
      transition: opacity 0.3s ease;
      letter-spacing: 0.5px;
    }

    .error-msg.visible {
      opacity: 1;
    }

    /* shake animation on wrong password */
    @keyframes shake {
      0%, 100% { transform: translateX(-50%); }
      20%       { transform: translateX(calc(-50% - 8px)); }
      40%       { transform: translateX(calc(-50% + 8px)); }
      60%       { transform: translateX(calc(-50% - 5px)); }
      80%       { transform: translateX(calc(-50% + 5px)); }
    }

    .password-wrapper.shake {
      animation: shake 0.45s ease;
    }

    /* ── Moon ── */
    .moon {
      position: absolute;
      right: 7%;
      top: 24%;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle at 35% 30%, #eeeeee 0%, #c9c9c9 38%, #8f8f8f 100%);
      border-radius: 50%;
      box-shadow:
        -32px 0 0 var(--background-color) inset,
        0 0 22px rgba(201, 201, 201, 0.55);
      z-index: 2;
      overflow: hidden;
    }

    .moon span {
      position: absolute;
      background: rgba(120, 120, 120, 0.35);
      border-radius: 50%;
      box-shadow: inset 2px 2px 4px rgba(60, 60, 60, 0.35);
    }

    .moon span:nth-child(1) { width: 16px; height: 16px; top: 28px; left: 45px; }
    .moon span:nth-child(2) { width: 10px; height: 10px; top: 60px; left: 70px; }
    .moon span:nth-child(3) { width: 13px; height: 13px; top: 78px; left: 38px; }

    /* ── Stars ── */
    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--grey-color);
      border-radius: 50%;
      opacity: 0.4;
      animation: twinkle 2s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50%       { opacity: 1;    transform: scale(1.8); }
    }

    /* ── Page transition overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: var(--background-color);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.65s ease;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .content { transform: translateY(-70px); }

      .arabic-main { font-size: clamp(2.2rem, 11vw, 3.2rem); }
      .arabic-name  { font-size: clamp(1.8rem, 9vw,  2.6rem); }

      .password-wrapper { bottom: 60px; }

      .moon {
        width: 70px; height: 70px;
        right: 8%; top: 16%;
        box-shadow: -20px 0 0 var(--background-color) inset, 0 0 18px rgba(201,201,201,0.55);
      }
      .moon span:nth-child(1) { width: 10px; height: 10px; top: 18px; left: 28px; }
      .moon span:nth-child(2) { width:  7px; height:  7px; top: 38px; left: 44px; }
      .moon span:nth-child(3) { width:  9px; height:  9px; top: 50px; left: 25px; }
    }
  </style>
</head>

<body>

  <div class="stars"></div>

  <div class="moon">
    <span></span><span></span><span></span>
  </div>

  <main class="content">
    <p class="arabic-main">عيد مبارك</p>
    <p class="arabic-name">نائلة</p>
  </main>

  <!-- Password Box -->
  <div class="password-wrapper" id="pwWrapper">
    <span class="password-label">Enter to open ✦</span>
    <div class="password-row">
      <input
        class="password-input"
        id="pwInput"
        type="password"
        placeholder="your key…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="password-btn" id="pwBtn" aria-label="Unlock">➜</button>
    </div>
    <span class="error-msg" id="errMsg">That's not quite right ✦</span>
  </div>

  <!-- Fade overlay for transition -->
  <div class="overlay" id="overlay"></div>

  <script>
    /* ── Stars ── */
    const starsContainer = document.querySelector(".stars");
    for (let i = 0; i < 80; i++) {
      const star = document.createElement("span");
      star.classList.add("star");
      star.style.left = Math.random() * 100 + "vw";
      star.style.top  = Math.random() * 100 + "vh";
      star.style.animationDelay    = Math.random() * 3 + "s";
      star.style.animationDuration = 1.5 + Math.random() * 2.5 + "s";
      starsContainer.appendChild(star);
    }

    /* ── Password ── */
    const PASSWORD   = "Nailla25";
    const NEXT_PAGE  = "rose.html";

    const pwInput   = document.getElementById("pwInput");
    const pwBtn     = document.getElementById("pwBtn");
    const pwWrapper = document.getElementById("pwWrapper");
    const errMsg    = document.getElementById("errMsg");
    const overlay   = document.getElementById("overlay");

    function attempt() {
      if (pwInput.value === PASSWORD) {
        errMsg.classList.remove("visible");
        overlay.classList.add("active");
        setTimeout(() => { window.location.href = NEXT_PAGE; }, 680);
      } else {
        errMsg.classList.add("visible");
        pwWrapper.classList.remove("shake");
        void pwWrapper.offsetWidth; // reflow to restart animation
        pwWrapper.classList.add("shake");
        pwInput.value = "";
        pwInput.focus();
      }
    }

    pwBtn.addEventListener("click", attempt);
    pwInput.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
  </script>

</body>
</html>
