<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid Mubarak</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --background-color: #0B1026;
      --contrast-color: #F6C453;
      --grey-color: #C9C9C9;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: var(--background-color);
      position: relative;
      font-family: sans-serif;
    }

    .content {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 5;
      padding: 0 20px;
    }

    h1 {
      font-family: "Great Vibes", cursive;
      font-size: clamp(3rem, 8vw, 6rem);
      color: var(--contrast-color);
      font-weight: 400;
      text-shadow: 0 0 16px rgba(246, 196, 83, 0.65);
    }

    h2 {
      font-family: "Amiri", serif;
      font-size: clamp(2.3rem, 6vw, 4.8rem);
      color: var(--contrast-color);
      margin-top: 6px;
      text-shadow: 0 0 16px rgba(246, 196, 83, 0.65);
    }

    .continue-btn {
      position: absolute;
      bottom: 45px;
      left: 50%;
      transform: translateX(-50%);

      padding: 9px 22px;
      border: 1.5px solid var(--contrast-color);
      border-radius: 18px;

      background: rgba(246, 196, 83, 0.12);
      color: var(--contrast-color);

      font-family: "Amiri", serif;
      font-size: 1rem;
      text-decoration: none;
      letter-spacing: 0.5px;

      box-shadow: 0 0 12px rgba(246, 196, 83, 0.3);
      transition: 0.3s ease;
    }

    .continue-btn:hover {
      background: var(--contrast-color);
      color: var(--background-color);
      transform: translateX(-50%) scale(1.06);
      box-shadow: 0 0 22px rgba(246, 196, 83, 0.7);
    }

    .moon {
      position: absolute;
      right: 7%;
      top: 24%;
      width: 120px;
      height: 120px;
      background:
        radial-gradient(circle at 35% 30%, #eeeeee 0%, #c9c9c9 38%, #8f8f8f 100%);
      border-radius: 50%;
      box-shadow:
        -32px 0 0 var(--background-color) inset,
        0 0 22px rgba(201, 201, 201, 0.55);
      z-index: 2;
      overflow: hidden;
    }

    .moon span {
      position: absolute;
      background: rgba(120, 120, 120, 0.35);
      border-radius: 50%;
      box-shadow: inset 2px 2px 4px rgba(60, 60, 60, 0.35);
    }

    .moon span:nth-child(1) {
      width: 16px;
      height: 16px;
      top: 28px;
      left: 45px;
    }

    .moon span:nth-child(2) {
      width: 10px;
      height: 10px;
      top: 60px;
      left: 70px;
    }

    .moon span:nth-child(3) {
      width: 13px;
      height: 13px;
      top: 78px;
      left: 38px;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--grey-color);
      border-radius: 50%;
      opacity: 0.4;
      animation: twinkle 2s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.25;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.8);
      }
    }

    @media (max-width: 600px) {

      h1 {
        font-size: clamp(2.8rem, 13vw, 4rem);
      }

      h2 {
        font-size: clamp(2.2rem, 11vw, 3.5rem);
      }

      .continue-btn {
        bottom: 35px;
        font-size: 0.9rem;
        padding: 8px 18px;
      }

      .moon {
        width: 75px;
        height: 75px;
        right: 7%;
        top: 18%;
        box-shadow:
          -20px 0 0 var(--background-color) inset,
          0 0 18px rgba(201, 201, 201, 0.55);
      }

      .moon span:nth-child(1) {
        width: 10px;
        height: 10px;
        top: 18px;
        left: 28px;
      }

      .moon span:nth-child(2) {
        width: 7px;
        height: 7px;
        top: 38px;
        left: 44px;
      }

      .moon span:nth-child(3) {
        width: 9px;
        height: 9px;
        top: 50px;
        left: 25px;
      }
    }
  </style>
</head>

<body>

  <div class="stars"></div>

  <div class="moon">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <main class="content">
    <h1>Eid Mubarak</h1>
    <h2 lang="ar">عيد مبارك</h2>
  </main>

  <a href="rose.html" class="continue-btn">
    Continue ➜
  </a>

  <script>
    const starsContainer = document.querySelector(".stars");

    for (let i = 0; i < 80; i++) {
      const star = document.createElement("span");

      star.classList.add("star");

      star.style.left = Math.random() * 100 + "vw";
      star.style.top = Math.random() * 100 + "vh";

      star.style.animationDelay = Math.random() * 3 + "s";
      star.style.animationDuration = 1.5 + Math.random() * 2.5 + "s";

      starsContainer.appendChild(star);
    }
  </script>

</body>
</html>
