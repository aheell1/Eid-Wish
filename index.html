<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eid Mubarak</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080d1f;
      --gold: #F6C453;
      --gold-dim: rgba(246,196,83,0.55);
      --gold-faint: rgba(246,196,83,0.12);
      --white: #f0ead6;
    }
 
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
 
    body {
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      font-family: sans-serif;
      cursor: default;
    }
 
    /* ── Deep sky gradient ── */
    .sky {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #1a1040 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 20%, #0d1a3a 0%, transparent 60%),
        #080d1f;
      z-index: 0;
    }
 
    /* ── Nebula glow ── */
    .nebula {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }
    .nebula::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(120,80,200,0.13) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse-nebula 8s ease-in-out infinite alternate;
    }
    .nebula::after {
      content: '';
      position: absolute;
      width: 500px; height: 300px;
      bottom: 0; right: -100px;
      background: radial-gradient(ellipse, rgba(246,196,83,0.07) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse-nebula 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes pulse-nebula {
      from { opacity: 0.5; transform: translateX(-50%) scale(1); }
      to   { opacity: 1;   transform: translateX(-50%) scale(1.15); }
    }
 
    /* ── Stars canvas layer ── */
    #starfield { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
 
    /* ── Shooting stars ── */
    .shooting-star {
      position: fixed;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(246,196,83,0.9), transparent);
      border-radius: 999px;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
    }
 
    /* ── Moon ── */
    .moon-wrap {
      position: fixed;
      right: 8%;
      top: 12%;
      z-index: 6;
      animation: moon-float 9s ease-in-out infinite alternate;
    }
    @keyframes moon-float {
      from { transform: translateY(0px); }
      to   { transform: translateY(-14px); }
    }
 
    .moon {
      width: 130px; height: 130px;
      background: radial-gradient(circle at 38% 32%, #f5f0e0 0%, #d4cdb5 35%, #a09880 100%);
      border-radius: 50%;
      box-shadow:
        -38px 0 0 var(--bg) inset,
        0 0 60px rgba(240,225,170,0.22),
        0 0 120px rgba(240,225,170,0.1);
      position: relative;
      overflow: hidden;
    }
 
    .moon::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 62% 20%, rgba(255,255,255,0.18) 0%, transparent 50%);
    }
 
    .crater {
      position: absolute;
      background: rgba(100,95,80,0.28);
      border-radius: 50%;
      box-shadow: inset 2px 2px 5px rgba(60,58,40,0.3);
    }
    .crater:nth-child(1) { width:18px; height:18px; top:30px; left:52px; }
    .crater:nth-child(2) { width:11px; height:11px; top:66px; left:76px; }
    .crater:nth-child(3) { width:14px; height:14px; top:86px; left:42px; }
    .crater:nth-child(4) { width: 8px; height: 8px; top:48px; left:38px; }
 
    /* Glow ring around moon */
    .moon-glow {
      position: absolute;
      inset: -25px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240,215,140,0.12) 40%, transparent 70%);
      animation: glow-pulse 5s ease-in-out infinite alternate;
    }
    @keyframes glow-pulse {
      from { opacity: 0.6; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.08); }
    }
 
    /* Stars near moon */
    .star-cluster {
      position: fixed;
      right: 6%;
      top: 8%;
      z-index: 5;
      pointer-events: none;
    }
    .star-cluster span {
      position: absolute;
      background: var(--white);
      border-radius: 50%;
      animation: twinkle 2.5s ease-in-out infinite;
    }
    .star-cluster span:nth-child(1) { width:4px; height:4px; top:-20px; left:40px;  animation-delay:0s; }
    .star-cluster span:nth-child(2) { width:3px; height:3px; top:10px;  left:-18px; animation-delay:0.8s; }
    .star-cluster span:nth-child(3) { width:5px; height:5px; top:-35px; left:100px; animation-delay:1.4s; }
    .star-cluster span:nth-child(4) { width:3px; height:3px; top:50px;  left:80px;  animation-delay:0.4s; }
    .star-cluster span:nth-child(5) { width:2px; height:2px; top:-10px; left:150px; animation-delay:2s; }
 
    /* ── Lanterns ── */
    .lantern {
      position: fixed;
      z-index: 5;
      pointer-events: none;
      animation: lantern-sway 6s ease-in-out infinite alternate;
      transform-origin: top center;
    }
    @keyframes lantern-sway {
      from { transform: rotate(-6deg); }
      to   { transform: rotate(6deg); }
    }
    .lantern:nth-child(1) { top: -10px; left: 5%;  animation-delay: 0s; }
    .lantern:nth-child(2) { top: -10px; right: 18%; animation-delay: 1.2s; animation-direction: alternate-reverse; }
    .lantern:nth-child(3) { top: -10px; left: 22%;  animation-delay: 0.6s; }
 
    .lantern svg { filter: drop-shadow(0 0 8px rgba(246,196,83,0.5)); }
 
    /* ── Floating particles ── */
    .particle {
      position: fixed;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--gold);
      pointer-events: none;
      z-index: 4;
      animation: float-up linear infinite;
      opacity: 0;
    }
    @keyframes float-up {
      0%   { opacity: 0; transform: translateY(0) scale(0.5); }
      15%  { opacity: 0.6; }
      85%  { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1.2); }
    }
 
    /* ── Main content ── */
    .content {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
      padding: 0 24px;
      transform: translateY(-28px);
    }
 
    /* Ornamental divider */
    .ornament {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      opacity: 0;
      animation: fade-rise 1.2s ease forwards 0.4s;
    }
    .ornament-line {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim));
    }
    .ornament-line.r { background: linear-gradient(90deg, var(--gold-dim), transparent); }
    .ornament-dot {
      width: 5px; height: 5px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--gold);
    }
    .ornament-diamond {
      width: 7px; height: 7px;
      background: var(--gold);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--gold);
    }
 
    .arabic-main {
      font-family: "Amiri", serif;
      font-size: clamp(3rem, 8vw, 6rem);
      color: var(--gold);
      font-weight: 700;
      direction: rtl;
      line-height: 1.2;
      text-shadow:
        0 0 30px rgba(246,196,83,0.6),
        0 0 80px rgba(246,196,83,0.2);
      opacity: 0;
      animation: fade-rise 1.4s ease forwards 0.7s;
      letter-spacing: 2px;
    }
 
    /* thin rule */
    .rule {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, transparent, var(--gold-dim), transparent);
      margin: 14px auto;
      opacity: 0;
      animation: fade-rise 1s ease forwards 1.2s;
    }
 
    .arabic-name {
      font-family: "Great Vibes", cursive;
      font-size: clamp(2.4rem, 6vw, 4.6rem);
      color: var(--white);
      direction: rtl;
      opacity: 0;
      animation: fade-rise 1.4s ease forwards 1.5s;
      text-shadow: 0 0 20px rgba(240,230,200,0.4);
      letter-spacing: 1px;
    }
 
    .subtitle {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      color: var(--gold);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 20px;
      opacity: 0;
      animation: fade-rise 1.2s ease forwards 2s;
      text-shadow: 0 0 15px rgba(246,196,83,0.5);
      font-weight: 300;
    }
 
    @keyframes fade-rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* ── Password box ── */
    .password-wrapper {
      position: fixed;
      bottom: 38px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      opacity: 0;
      animation: fade-rise 1.2s ease forwards 2.4s;
    }
 
    .password-row {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(246,196,83,0.12);
      border: 1px solid rgba(246,196,83,0.5);
      border-radius: 40px;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-shadow: 0 0 25px rgba(246,196,83,0.2), inset 0 0 20px rgba(246,196,83,0.08);
    }
 
    .password-row:focus-within {
      border-color: rgba(246,196,83,0.85);
      box-shadow: 0 0 40px rgba(246,196,83,0.45), 0 0 80px rgba(246,196,83,0.15), inset 0 0 25px rgba(246,196,83,0.12);
    }
 
    .lock-icon {
      padding: 0 0 0 15px;
      color: var(--gold);
      font-size: 0.9rem;
      user-select: none;
      opacity: 0.85;
    }
 
    .password-input {
      background: transparent;
      border: none;
      outline: none;
      padding: 11px 14px;
      font-family: "Amiri", serif;
      font-size: 1rem;
      color: var(--gold);
      width: 155px;
      letter-spacing: 2px;
      text-align: center;
    }
 
    .password-input::placeholder {
      color: rgba(246,196,83,0.7);
      font-size: 0.82rem;
      letter-spacing: 1px;
      font-family: "Cormorant Garamond", serif;
    }
 
    .password-btn {
      background: rgba(246,196,83,0.18);
      border: none;
      border-left: 1px solid rgba(246,196,83,0.35);
      color: var(--gold);
      padding: 11px 18px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.25s, transform 0.15s;
      display: flex; align-items: center;
    }
    .password-btn:hover { 
      background: rgba(246,196,83,0.35); 
      transform: translateX(2px);
    }
    .password-btn:active { transform: translateX(0); }
 
    .error-msg {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 0.8rem;
      color: rgba(255,140,130,0.95);
      opacity: 0;
      transition: opacity 0.3s;
      letter-spacing: 0.5px;
      text-shadow: 0 0 8px rgba(220,110,100,0.3);
    }
    .error-msg.visible { opacity: 1; }
 
    @keyframes shake {
      0%,100% { transform: translateX(-50%); }
      20%      { transform: translateX(calc(-50% - 9px)); }
      40%      { transform: translateX(calc(-50% + 9px)); }
      60%      { transform: translateX(calc(-50% - 5px)); }
      80%      { transform: translateX(calc(-50% + 5px)); }
    }
    .password-wrapper.shake { animation: shake 0.45s ease; }
 
    /* ── Fade overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
    }
    .overlay.active { opacity: 1; pointer-events: all; }
 
    /* ── Twinkle ── */
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.6); }
    }
 
    /* ── Mobile ── */
    @media (max-width: 600px) {
      .content { transform: translateY(-55px); }
      .arabic-main { font-size: clamp(2.5rem, 13vw, 3.5rem); }
      .arabic-name  { font-size: clamp(2rem, 10vw, 3rem); }
      .moon-wrap { width: 80px; right: 5%; top: 10%; }
      .moon { width: 80px; height: 80px; box-shadow: -24px 0 0 var(--bg) inset, 0 0 40px rgba(240,215,140,0.18); }
      .lantern:nth-child(3) { display: none; }
      .password-wrapper { bottom: 55px; }
      
      /* Mobile password enhancements */
      .password-input {
        width: 140px;
        font-size: 0.95rem;
        padding: 10px 12px;
      }
      .subtitle {
        font-size: clamp(0.7rem, 2.5vw, 0.85rem);
        letter-spacing: 3px;
        text-shadow: 0 0 12px rgba(246,196,83,0.6);
      }
      .password-row {
        box-shadow: 0 0 30px rgba(246,196,83,0.25), inset 0 0 22px rgba(246,196,83,0.1);
      }
    }
  </style>
</head>
<body>

<!-- Lanterns -->
<div class="lantern">
  <svg width="32" height="70" viewBox="0 0 32 70" fill="none" xmlns="http://www.w3.org/2000/svg">

<script>
/* ── Starfield on canvas ── */
const canvas = document.getElementById('starfield');
const ctx    = canvas.getContext('2d');
let W, H, stars = [];
 
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
 
function initStars() {
  stars = [];
  const count = Math.floor((W * H) / 5000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: 0.4 + Math.random() * 0.8,
      gold: Math.random() < 0.08
    });
  }
}
 
function drawStars(t) {
  ctx.clearRect(0, 0, W, H);
  stars.forEach(s => {
    const alpha = 0.25 + 0.65 * (0.5 + 0.5 * Math.sin(s.phase + t * s.speed * 0.001));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.gold
      ? `rgba(246,196,83,${alpha})`
      : `rgba(220,220,240,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
 
resize();
initStars();
requestAnimationFrame(drawStars);
window.addEventListener('resize', () => { resize(); initStars(); });
 
/* ── Shooting stars ── */
function shootStar() {
  const el   = document.createElement('div');
  el.className = 'shooting-star';
  const len  = 80 + Math.random() * 180;
  const angle = 20 + Math.random() * 20;
  const startX = Math.random() * window.innerWidth * 0.7;
  const startY = Math.random() * window.innerHeight * 0.4;
  el.style.cssText = `
    width: ${len}px;
    left: ${startX}px;
    top: ${startY}px;
    transform: rotate(${angle}deg);
    transform-origin: left center;
    transition: opacity 0.2s;
  `;
  document.body.appendChild(el);
  requestAnimationFrame(() => {
    el.style.opacity = '1';
    el.style.transition = `left ${0.6 + Math.random()*0.4}s linear, top ${0.6 + Math.random()*0.4}s linear, opacity 0.5s`;
    el.style.left = (startX + len * Math.cos(angle * Math.PI/180)) + 'px';
    el.style.top  = (startY + len * Math.sin(angle * Math.PI/180)) + 'px';
    setTimeout(() => {
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 500);
    }, 500);
  });
  setTimeout(shootStar, 3000 + Math.random() * 5000);
}
setTimeout(shootStar, 2000);
 
/* ── Floating gold particles ── */
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left: ${5 + Math.random() * 90}%;
    bottom: ${-10 + Math.random() * 20}%;
    width: ${1.5 + Math.random() * 2.5}px;
    height: ${1.5 + Math.random() * 2.5}px;
    animation-duration: ${8 + Math.random() * 14}s;
    animation-delay: ${Math.random() * 10}s;
    opacity: 0;
  `;
  document.body.appendChild(p);
}
 
/* ── Mouse parallax ── */
let mx = 0, my = 0;
document.addEventListener('mousemove', e => {
  mx = (e.clientX / window.innerWidth  - 0.5) * 2;
  my = (e.clientY / window.innerHeight - 0.5) * 2;
});
(function parallax() {
  const moon = document.querySelector('.moon-wrap');
  if (moon) {
    const cx = parseFloat(moon.style.getPropertyValue('--cx') || 0);
    const cy = parseFloat(moon.style.getPropertyValue('--cy') || 0);
    const tx = mx * 12, ty = my * 8;
    const nx = cx + (tx - cx) * 0.04;
    const ny = cy + (ty - cy) * 0.04;
    moon.style.setProperty('--cx', nx);
    moon.style.setProperty('--cy', ny);
    moon.style.transform = `translate(${nx}px, ${ny}px)`;
  }
  requestAnimationFrame(parallax);
})();
 
/* ── Password ── */
const PASSWORD  = "Nailla25";
const NEXT_PAGE = "rose.html";
const pwInput   = document.getElementById('pwInput');
const pwBtn     = document.getElementById('pwBtn');
const pwWrapper = document.getElementById('pwWrapper');
const errMsg    = document.getElementById('errMsg');
const overlay   = document.getElementById('overlay');
 
function attempt() {
  if (pwInput.value === PASSWORD) {
    errMsg.classList.remove('visible');
    overlay.classList.add('active');
    setTimeout(() => { window.location.href = NEXT_PAGE; }, 750);
  } else {
    errMsg.classList.add('visible');
    pwWrapper.classList.remove('shake');
    void pwWrapper.offsetWidth;
    pwWrapper.classList.add('shake');
    pwInput.value = '';
    pwInput.focus();
  }
}
pwBtn.addEventListener('click', attempt);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
</script>
</body>
</html>
