<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0B1026;
      --gold: #F6C453;
      --pink1: #ffd1dc;
      --pink2: #ff8fab;
      --pink3: #ff4f81;
      --pink4: #b5174b;
      --green1: #bbf7d0;
      --green2: #22c55e;
      --green3: #14532d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 75%, rgba(246,196,83,.13), transparent 24%),
        radial-gradient(circle at center, #111a38 0%, var(--bg) 55%, #030712 100%);
      font-family: sans-serif;
    }

    h1 {
      position: fixed;
      top: 45px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Great Vibes", cursive;
      font-size: clamp(3.5rem, 12vw, 6.2rem);
      color: var(--gold);
      font-weight: 400;
      text-shadow: 0 0 24px rgba(246, 196, 83, 0.75);
      z-index: 20;
    }

    .garden {
      position: absolute;
      left: 50%;
      bottom: 70px;
      width: 380px;
      height: 500px;
      transform: translateX(-50%);
    }

    .glow {
      position: absolute;
      bottom: 25px;
      left: 50%;
      width: 320px;
      height: 65px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(246,196,83,.28), transparent 70%);
      filter: blur(8px);
    }

    .flower {
      position: absolute;
      bottom: 35px;
      width: 120px;
      height: 360px;
      transform-origin: bottom center;
      animation: sway 5s ease-in-out infinite;
    }

    .flower.big {
      left: 130px;
      height: 410px;
      z-index: 5;
    }

    .flower.left {
      left: 58px;
      height: 315px;
      transform: scale(.82);
      z-index: 4;
      animation-delay: .6s;
    }

    .flower.right {
      left: 218px;
      height: 330px;
      transform: scale(.86);
      z-index: 4;
      animation-delay: 1s;
    }

    .flower.small-left {
      left: 105px;
      height: 260px;
      transform: scale(.68);
      z-index: 3;
      animation-delay: 1.3s;
    }

    .flower.small-right {
      left: 190px;
      height: 270px;
      transform: scale(.7);
      z-index: 3;
      animation-delay: 1.6s;
    }

    .stem {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 7px;
      height: 0;
      transform: translateX(-50%);
      background: linear-gradient(to right, var(--green3), var(--green2), var(--green1));
      border-radius: 50px;
      box-shadow: 0 0 13px rgba(74, 222, 128, .45);
      animation: growStem 1.6s ease forwards;
    }

    .head {
      position: absolute;
      top: 0;
      left: 50%;
      width: 115px;
      height: 115px;
      transform: translateX(-50%) scale(0);
      animation: headBloom .9s ease forwards;
      animation-delay: 1.4s;
      filter: drop-shadow(0 0 18px rgba(255, 143, 171, .75));
    }

    .flower.left .head { transform-origin: center bottom; rotate: -12deg; }
    .flower.right .head { transform-origin: center bottom; rotate: 13deg; }

    .petal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34px;
      height: 54px;
      margin-left: -17px;
      margin-top: -48px;
      background:
        radial-gradient(circle at 30% 20%, #fff0f4 0 8%, var(--pink1) 18%, var(--pink2) 42%, var(--pink3) 68%, var(--pink4) 100%);
      border-radius: 70% 30% 65% 35%;
      transform-origin: 50% 95%;
      opacity: 0;
      box-shadow:
        inset -5px -7px 10px rgba(120, 0, 45, .27),
        inset 4px 4px 9px rgba(255,255,255,.2),
        0 0 10px rgba(255, 95, 150, .18);
      animation: petalOpen .8s ease forwards;
    }

    .petal.outer {
      width: 39px;
      height: 66px;
      margin-left: -19.5px;
      margin-top: -58px;
    }

    .petal.inner {
      width: 28px;
      height: 44px;
      margin-left: -14px;
      margin-top: -38px;
      border-radius: 65% 35% 70% 30%;
      z-index: 4;
    }

    .petal:nth-child(1) { --a: 0deg; --d: 30px; animation-delay: 1.65s; }
    .petal:nth-child(2) { --a: 40deg; --d: 30px; animation-delay: 1.75s; }
    .petal:nth-child(3) { --a: 80deg; --d: 30px; animation-delay: 1.85s; }
    .petal:nth-child(4) { --a: 120deg; --d: 30px; animation-delay: 1.95s; }
    .petal:nth-child(5) { --a: 160deg; --d: 30px; animation-delay: 2.05s; }
    .petal:nth-child(6) { --a: 200deg; --d: 30px; animation-delay: 2.15s; }
    .petal:nth-child(7) { --a: 240deg; --d: 30px; animation-delay: 2.25s; }
    .petal:nth-child(8) { --a: 280deg; --d: 30px; animation-delay: 2.35s; }
    .petal:nth-child(9) { --a: 320deg; --d: 30px; animation-delay: 2.45s; }

    .petal:nth-child(10) { --a: 25deg; --d: 18px; animation-delay: 2.2s; }
    .petal:nth-child(11) { --a: 115deg; --d: 18px; animation-delay: 2.32s; }
    .petal:nth-child(12) { --a: 205deg; --d: 18px; animation-delay: 2.44s; }
    .petal:nth-child(13) { --a: 295deg; --d: 18px; animation-delay: 2.56s; }

    .core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 24px;
      height: 24px;
      transform: translate(-50%, -50%) scale(0);
      border-radius: 50%;
      background: radial-gradient(circle, #fff5f7 0 8%, #ffd1dc 20%, #ff4f81 55%, #8f1234 100%);
      box-shadow: 0 0 15px rgba(255, 200, 215, .75), inset -4px -4px 8px rgba(80,0,30,.35);
      z-index: 9;
      animation: coreShow .65s ease forwards;
      animation-delay: 2.75s;
    }

    .leaf {
      position: absolute;
      width: 70px;
      height: 28px;
      background: linear-gradient(135deg, var(--green1), var(--green2), var(--green3));
      border-radius: 100% 0 100% 0;
      opacity: 0;
      box-shadow: inset -5px -5px 8px rgba(0,70,30,.32), 0 0 10px rgba(74,222,128,.35);
    }

    .leaf::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 18%;
      width: 60%;
      height: 1px;
      background: rgba(255,255,255,.35);
      transform: rotate(-12deg);
    }

    .leaf.l1 {
      left: 13px;
      bottom: 110px;
      transform-origin: right center;
      animation: leafLeft .8s ease forwards;
      animation-delay: 1.05s;
    }

    .leaf.l2 {
      right: 8px;
      bottom: 160px;
      transform-origin: left center;
      animation: leafRight .8s ease forwards;
      animation-delay: 1.25s;
    }

    .grass {
      position: absolute;
      bottom: 22px;
      width: 7px;
      height: 0;
      background: linear-gradient(#bbf7d0, #22c55e, #166534);
      border-radius: 100% 100% 0 0;
      transform-origin: bottom center;
      filter: drop-shadow(0 0 8px rgba(74,222,128,.5));
      animation: grassGrow 1.2s ease forwards;
    }

    .g1 { left: 25px; rotate: -20deg; animation-delay: .1s; }
    .g2 { left: 55px; rotate: 10deg; animation-delay: .25s; }
    .g3 { left: 300px; rotate: 17deg; animation-delay: .18s; }
    .g4 { left: 330px; rotate: -12deg; animation-delay: .35s; }
    .g5 { left: 255px; rotate: 24deg; animation-delay: .48s; }
    .g6 { left: 90px; rotate: -10deg; animation-delay: .55s; }

    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px var(--gold);
      opacity: .5;
      animation: sparkle 2.5s ease-in-out infinite;
    }

    .next-btn {
      position: fixed;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      border: 1.5px solid var(--gold);
      border-radius: 18px;
      background: rgba(246, 196, 83, 0.12);
      color: var(--gold);
      font-family: "Amiri", serif;
      font-size: 0.95rem;
      text-decoration: none;
      box-shadow: 0 0 12px rgba(246, 196, 83, 0.3);
      z-index: 30;
    }

    @keyframes growStem {
      to { height: 100%; }
    }

    @keyframes headBloom {
      to { transform: translateX(-50%) scale(1); }
    }

    @keyframes petalOpen {
      from {
        opacity: 0;
        transform: rotate(var(--a)) translateY(0) scale(.18) rotateX(65deg);
      }
      to {
        opacity: 1;
        transform: rotate(var(--a)) translateY(var(--d)) scale(1) rotateX(0deg);
      }
    }

    @keyframes coreShow {
      to { transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes leafLeft {
      to {
        opacity: 1;
        transform: rotate(-32deg) scale(1);
      }
    }

    @keyframes leafRight {
      to {
        opacity: 1;
        transform: rotate(210deg) scale(1);
      }
    }

    @keyframes grassGrow {
      to { height: 130px; }
    }

    @keyframes sway {
      0%, 100% { rotate: -1.3deg; }
      50% { rotate: 1.4deg; }
    }

    @keyframes sparkle {
      0%, 100% {
        opacity: .2;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.8);
      }
    }

    @media (max-width: 600px) {
      h1 {
        top: 55px;
        font-size: clamp(3.2rem, 16vw, 4.5rem);
      }

      .garden {
        transform: translateX(-50%) scale(.82);
        bottom: 80px;
      }

      .next-btn {
        bottom: 70px;
        font-size: .85rem;
        padding: 7px 16px;
      }
    }
  </style>
</head>

<body>

  <h1>For You</h1>

  <div class="garden">
    <div class="glow"></div>

    <div class="flower big">
      <div class="stem"></div>
      <span class="leaf l1"></span>
      <span class="leaf l2"></span>
      <div class="head">
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
      </div>
    </div>

    <div class="flower left">
      <div class="stem"></div>
      <span class="leaf l1"></span>
      <span class="leaf l2"></span>
      <div class="head">
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
      </div>
    </div>

    <div class="flower right">
      <div class="stem"></div>
      <span class="leaf l1"></span>
      <span class="leaf l2"></span>
      <div class="head">
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
      </div>
    </div>

    <div class="flower small-left">
      <div class="stem"></div>
      <span class="leaf l1"></span>
      <span class="leaf l2"></span>
      <div class="head">
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
      </div>
    </div>

    <div class="flower small-right">
      <div class="stem"></div>
      <span class="leaf l1"></span>
      <span class="leaf l2"></span>
      <div class="head">
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
      </div>
    </div>

    <span class="grass g1"></span>
    <span class="grass g2"></span>
    <span class="grass g3"></span>
    <span class="grass g4"></span>
    <span class="grass g5"></span>
    <span class="grass g6"></span>
  </div>

  <a href="#" class="next-btn">Next ➜</a>

  <script>
    for (let i = 0; i < 32; i++) {
      const spark = document.createElement("span");
      spark.className = "spark";
      spark.style.left = Math.random() * 100 + "vw";
      spark.style.top = Math.random() * 100 + "vh";
      spark.style.animationDelay = Math.random() * 3 + "s";
      document.body.appendChild(spark);
    }
  </script>

</body>
</html>
