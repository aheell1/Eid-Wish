<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0B1026;
      --gold: #F6C453;
      --pink-light: #ffd1dc;
      --pink: #ff7aa8;
      --pink-dark: #c9184a;
      --green: #2f9e44;
      --green-light: #95d5b2;
      --green-dark: #0f3d24;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 68%, rgba(246,196,83,0.16), transparent 22%),
        radial-gradient(circle at center, #111936 0%, var(--bg) 55%, #030712 100%);
      font-family: sans-serif;
    }

    h1 {
      position: fixed;
      top: 35px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Great Vibes", cursive;
      font-size: clamp(3.3rem, 12vw, 6.4rem);
      color: var(--gold);
      font-weight: 400;
      text-shadow: 0 0 25px rgba(246,196,83,0.85);
      z-index: 50;
      white-space: nowrap;
    }

    .garden {
      position: absolute;
      left: 50%;
      bottom: 75px;
      width: 420px;
      height: 500px;
      transform: translateX(-50%);
    }

    .soil-glow {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 350px;
      height: 60px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(246,196,83,.42), transparent 70%);
      filter: blur(9px);
    }

    .flower {
      position: absolute;
      bottom: 35px;
      width: 120px;
      height: 340px;
      transform-origin: bottom center;
      animation: sway 5s ease-in-out infinite;
    }

    .f1 { left: 150px; height: 390px; z-index: 5; }
    .f2 { left: 55px; height: 285px; transform: scale(.82); z-index: 4; animation-delay: .4s; }
    .f3 { left: 260px; height: 295px; transform: scale(.84); z-index: 4; animation-delay: .8s; }
    .f4 { left: 115px; height: 235px; transform: scale(.68); z-index: 3; animation-delay: 1.1s; }
    .f5 { left: 225px; height: 245px; transform: scale(.7); z-index: 3; animation-delay: 1.4s; }

    .stem {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 8px;
      height: 0;
      transform: translateX(-50%);
      background: linear-gradient(to right, var(--green-dark), var(--green), var(--green-light));
      border-radius: 40px;
      box-shadow: 0 0 12px rgba(80,220,130,.45);
      animation: growStem 1.6s ease forwards;
    }

    .head {
      position: absolute;
      top: 0;
      left: 50%;
      width: 125px;
      height: 120px;
      transform: translateX(-50%) scale(0);
      animation: bloomHead .9s ease forwards;
      animation-delay: 1.45s;
      filter: drop-shadow(0 0 18px rgba(255, 122, 168, .85));
    }

    .petal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38px;
      height: 62px;
      margin-left: -19px;
      margin-top: -56px;
      background:
        radial-gradient(circle at 30% 18%, #fff7fa 0 7%, var(--pink-light) 20%, var(--pink) 52%, var(--pink-dark) 100%);
      border-radius: 80% 20% 72% 28%;
      transform-origin: 50% 95%;
      opacity: 0;
      box-shadow:
        inset -6px -8px 12px rgba(120,0,45,.28),
        inset 5px 5px 11px rgba(255,255,255,.28);
      animation: openPetal .9s ease forwards;
    }

    .petal:nth-child(1)  { --a: 0deg; --d: 33px; animation-delay: 1.65s; }
    .petal:nth-child(2)  { --a: 32deg; --d: 34px; animation-delay: 1.75s; }
    .petal:nth-child(3)  { --a: 64deg; --d: 35px; animation-delay: 1.85s; }
    .petal:nth-child(4)  { --a: 96deg; --d: 34px; animation-delay: 1.95s; }
    .petal:nth-child(5)  { --a: 128deg; --d: 35px; animation-delay: 2.05s; }
    .petal:nth-child(6)  { --a: 160deg; --d: 34px; animation-delay: 2.15s; }
    .petal:nth-child(7)  { --a: 192deg; --d: 35px; animation-delay: 2.25s; }
    .petal:nth-child(8)  { --a: 224deg; --d: 34px; animation-delay: 2.35s; }
    .petal:nth-child(9)  { --a: 256deg; --d: 35px; animation-delay: 2.45s; }
    .petal:nth-child(10) { --a: 288deg; --d: 34px; animation-delay: 2.55s; }
    .petal:nth-child(11) { --a: 320deg; --d: 35px; animation-delay: 2.65s; }

    .inner {
      width: 28px;
      height: 46px;
      margin-left: -14px;
      margin-top: -40px;
      z-index: 6;
      --d: 18px;
    }

    .core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: radial-gradient(circle, #fff6f8, #ff7aa8 45%, #8f1234);
      box-shadow: 0 0 18px rgba(255,220,230,.8);
      z-index: 10;
      animation: coreShow .6s ease forwards;
      animation-delay: 2.75s;
    }

    .leaf {
      position: absolute;
      width: 72px;
      height: 30px;
      background: linear-gradient(135deg, var(--green-light), var(--green), var(--green-dark));
      border-radius: 100% 0 100% 0;
      opacity: 0;
      box-shadow: inset -5px -5px 8px rgba(0,70,30,.32);
    }

    .leaf.l1 {
      left: 10px;
      bottom: 120px;
      transform-origin: right center;
      animation: leafLeft .8s ease forwards;
      animation-delay: 1s;
    }

    .leaf.l2 {
      right: 8px;
      bottom: 170px;
      transform-origin: left center;
      animation: leafRight .8s ease forwards;
      animation-delay: 1.2s;
    }

    .grass {
      position: absolute;
      bottom: 0;
      width: 7px;
      height: 0;
      background: linear-gradient(#bbf7d0, #22c55e, #14532d);
      border-radius: 100% 100% 0 0;
      transform-origin: bottom center;
      filter: drop-shadow(0 0 8px rgba(74,222,128,.55));
      animation: grassGrow 1.4s ease forwards;
    }

    .g1 { left: 20px; rotate: -24deg; animation-delay: .1s; }
    .g2 { left: 55px; rotate: 12deg; animation-delay: .2s; }
    .g3 { left: 90px; rotate: -10deg; animation-delay: .3s; }
    .g4 { left: 310px; rotate: 18deg; animation-delay: .25s; }
    .g5 { left: 345px; rotate: -14deg; animation-delay: .4s; }
    .g6 { left: 375px; rotate: 22deg; animation-delay: .5s; }

    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 14px var(--gold);
      animation: sparkle 2.6s ease-in-out infinite;
    }

    .next-btn {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 22px;
      border: 1.5px solid var(--gold);
      border-radius: 18px;
      background: rgba(246,196,83,.12);
      color: var(--gold);
      font-family: "Amiri", serif;
      font-size: .95rem;
      text-decoration: none;
      box-shadow: 0 0 13px rgba(246,196,83,.35);
      z-index: 60;
    }

    @keyframes growStem {
      to { height: 100%; }
    }

    @keyframes bloomHead {
      to { transform: translateX(-50%) scale(1); }
    }

    @keyframes openPetal {
      from {
        opacity: 0;
        transform: rotate(var(--a)) translateY(0) scale(.15);
      }
      to {
        opacity: 1;
        transform: rotate(var(--a)) translateY(var(--d)) scale(1);
      }
    }

    @keyframes coreShow {
      to { transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes leafLeft {
      to {
        opacity: 1;
        transform: rotate(-32deg) scale(1);
      }
    }

    @keyframes leafRight {
      to {
        opacity: 1;
        transform: rotate(210deg) scale(1);
      }
    }

    @keyframes grassGrow {
      to { height: 135px; }
    }

    @keyframes sway {
      0%, 100% { rotate: -1.2deg; }
      50% { rotate: 1.3deg; }
    }

    @keyframes sparkle {
      0%, 100% {
        opacity: .2;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.9);
      }
    }

    @media (max-width: 600px) {
      h1 {
        top: 42px;
        font-size: clamp(3.1rem, 16vw, 4.4rem);
      }

      .garden {
        transform: translateX(-50%) scale(.78);
        bottom: 85px;
      }

      .next-btn {
        bottom: 70px;
        font-size: .85rem;
        padding: 7px 17px;
      }
    }
  </style>
</head>

<body>

  <h1>For You</h1>

  <div class="garden">
    <div class="soil-glow"></div>

    <div class="flower f1">
      <div class="stem"></div><span class="leaf l1"></span><span class="leaf l2"></span>
      <div class="head">
        <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
      </div>
    </div>

    <div class="flower f2">
      <div class="stem"></div><span class="leaf l1"></span><span class="leaf l2"></span>
      <div class="head">
        <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
      </div>
    </div>

    <div class="flower f3">
      <div class="stem"></div><span class="leaf l1"></span><span class="leaf l2"></span>
      <div class="head">
        <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
      </div>
    </div>

    <div class="flower f4">
      <div class="stem"></div><span class="leaf l1"></span><span class="leaf l2"></span>
      <div class="head">
        <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
      </div>
    </div>

    <div class="flower f5">
      <div class="stem"></div><span class="leaf l1"></span><span class="leaf l2"></span>
      <div class="head">
        <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
      </div>
    </div>

    <span class="grass g1"></span>
    <span class="grass g2"></span>
    <span class="grass g3"></span>
    <span class="grass g4"></span>
    <span class="grass g5"></span>
    <span class="grass g6"></span>
  </div>

  <a href="#" class="next-btn">Next ➜</a>

  <script>
    for (let i = 0; i < 34; i++) {
      const spark = document.createElement("span");
      spark.className = "spark";
      spark.style.left = Math.random() * 100 + "vw";
      spark.style.top = Math.random() * 100 + "vh";
      spark.style.animationDelay = Math.random() * 3 + "s";
      document.body.appendChild(spark);
    }
  </script>

</body>
</html>
