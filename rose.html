<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0B1026;
      --gold: #F6C453;
      --pink: #ff9fbd;
      --pink-dark: #ff5f95;
      --green: #4ade80;
      --green-dark: #166534;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at bottom, #111a38 0%, var(--bg) 55%, #030712 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }

    h1 {
      position: fixed;
      top: 45px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Great Vibes", cursive;
      font-size: clamp(3.4rem, 12vw, 6rem);
      color: var(--gold);
      font-weight: 400;
      text-shadow: 0 0 22px rgba(246, 196, 83, 0.75);
      z-index: 10;
    }

    .garden {
      position: relative;
      width: 360px;
      height: 520px;
      margin-top: 80px;
    }

    .ground {
      position: absolute;
      bottom: 58px;
      left: 50%;
      width: 280px;
      height: 34px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(246,196,83,0.25), transparent 70%);
      filter: blur(6px);
    }

    .flower {
      position: absolute;
      bottom: 70px;
      width: 90px;
      height: 270px;
      transform-origin: bottom center;
      animation: sway 4s ease-in-out infinite;
    }

    .flower:nth-child(1) {
      left: 130px;
      height: 330px;
      animation-delay: 0s;
    }

    .flower:nth-child(2) {
      left: 70px;
      height: 250px;
      transform: scale(0.8);
      animation-delay: 0.5s;
    }

    .flower:nth-child(3) {
      left: 205px;
      height: 255px;
      transform: scale(0.85);
      animation-delay: 1s;
    }

    .flower:nth-child(4) {
      left: 105px;
      height: 210px;
      transform: scale(0.7);
      animation-delay: 1.3s;
    }

    .flower:nth-child(5) {
      left: 185px;
      height: 220px;
      transform: scale(0.72);
      animation-delay: 1.6s;
    }

    .stem {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 6px;
      height: 0;
      background: linear-gradient(to right, var(--green-dark), var(--green), #bbf7d0);
      border-radius: 30px;
      transform: translateX(-50%);
      box-shadow: 0 0 12px rgba(74, 222, 128, 0.4);
      animation: growStem 1.7s ease forwards;
    }

    .head {
      position: absolute;
      left: 50%;
      top: 0;
      width: 80px;
      height: 75px;
      transform: translateX(-50%) scale(0);
      animation: bloom 1s ease forwards;
      animation-delay: 1.6s;
      filter: drop-shadow(0 0 16px rgba(255, 159, 189, 0.75));
    }

    .petal {
      position: absolute;
      width: 38px;
      height: 34px;
      background: radial-gradient(circle at 35% 25%, #ffd1dc, var(--pink), var(--pink-dark));
      border-radius: 70% 30% 70% 30%;
      box-shadow: inset -4px -4px 8px rgba(180, 20, 80, 0.28);
      opacity: 0;
      animation: openPetal 0.8s ease forwards;
      animation-delay: 1.8s;
    }

    .petal.p1 {
      left: 21px;
      top: 0;
      transform-origin: bottom center;
    }

    .petal.p2 {
      left: 2px;
      top: 22px;
      transform: rotate(-35deg);
      transform-origin: right bottom;
      animation-delay: 2s;
    }

    .petal.p3 {
      right: 2px;
      top: 22px;
      transform: rotate(35deg);
      transform-origin: left bottom;
      animation-delay: 2s;
    }

    .petal.p4 {
      left: 20px;
      top: 28px;
      transform: rotate(180deg);
      animation-delay: 2.15s;
    }

    .center {
      position: absolute;
      width: 18px;
      height: 18px;
      left: 31px;
      top: 31px;
      border-radius: 50%;
      background: #ffe4ec;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.75);
      opacity: 0;
      animation: centerShow 0.6s ease forwards;
      animation-delay: 2.3s;
    }

    .leaf {
      position: absolute;
      width: 55px;
      height: 24px;
      background: linear-gradient(135deg, #bbf7d0, #22c55e, #166534);
      border-radius: 100% 0 100% 0;
      opacity: 0;
      box-shadow: 0 0 10px rgba(74, 222, 128, 0.35);
      animation: leafOpen 0.8s ease forwards;
      animation-delay: 1.1s;
    }

    .leaf.left {
      left: 3px;
      bottom: 95px;
      transform-origin: right center;
    }

    .leaf.right {
      right: 3px;
      bottom: 135px;
      transform-origin: left center;
      animation-delay: 1.3s;
    }

    .grass {
      position: absolute;
      bottom: 60px;
      width: 6px;
      height: 0;
      background: linear-gradient(#86efac, #16a34a);
      border-radius: 100% 100% 0 0;
      transform-origin: bottom center;
      animation: growGrass 1.4s ease forwards;
      filter: drop-shadow(0 0 8px rgba(74, 222, 128, 0.5));
    }

    .grass:nth-of-type(6) { left: 20px; transform: rotate(-18deg); animation-delay: .2s; }
    .grass:nth-of-type(7) { left: 45px; transform: rotate(12deg); animation-delay: .4s; }
    .grass:nth-of-type(8) { left: 295px; transform: rotate(18deg); animation-delay: .3s; }
    .grass:nth-of-type(9) { left: 320px; transform: rotate(-10deg); animation-delay: .5s; }
    .grass:nth-of-type(10) { left: 250px; transform: rotate(25deg); animation-delay: .6s; }

    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px var(--gold);
      animation: sparkle 2.5s ease-in-out infinite;
    }

    .message {
      position: fixed;
      bottom: 95px;
      width: 90%;
      max-width: 430px;
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.95rem;
      line-height: 1.7;
      z-index: 10;
    }

    .next-btn {
      position: fixed;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      border: 1.5px solid var(--gold);
      border-radius: 18px;
      background: rgba(246, 196, 83, 0.12);
      color: var(--gold);
      font-family: "Amiri", serif;
      font-size: 0.95rem;
      text-decoration: none;
      box-shadow: 0 0 12px rgba(246, 196, 83, 0.3);
      z-index: 10;
    }

    @keyframes growStem {
      to { height: 100%; }
    }

    @keyframes bloom {
      to { transform: translateX(-50%) scale(1); }
    }

    @keyframes openPetal {
      from {
        opacity: 0;
        scale: 0.2;
      }
      to {
        opacity: 1;
        scale: 1;
      }
    }

    @keyframes centerShow {
      to { opacity: 1; }
    }

    @keyframes leafOpen {
      to {
        opacity: 1;
        transform: rotate(-30deg) scale(1);
      }
    }

    .leaf.right {
      animation-name: leafOpenRight;
    }

    @keyframes leafOpenRight {
      to {
        opacity: 1;
        transform: rotate(210deg) scale(1);
      }
    }

    @keyframes growGrass {
      to { height: 135px; }
    }

    @keyframes sway {
      0%, 100% { rotate: -1.5deg; }
      50% { rotate: 1.5deg; }
    }

    @keyframes sparkle {
      0%, 100% {
        opacity: 0.2;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.8);
      }
    }

    @media (max-width: 600px) {
      h1 {
        top: 55px;
        font-size: clamp(3.2rem, 16vw, 4.5rem);
      }

      .garden {
        transform: scale(0.82);
        margin-top: 30px;
      }

      .message {
        bottom: 125px;
        max-width: 330px;
        font-size: 0.88rem;
      }

      .next-btn {
        bottom: 70px;
        font-size: 0.85rem;
        padding: 7px 16px;
      }
    }
  </style>
</head>

<body>

  <h1>For You</h1>

  <div class="garden">
    <div class="ground"></div>

    <div class="flower">
      <div class="stem"></div>
      <span class="leaf left"></span>
      <span class="leaf right"></span>
      <div class="head">
        <span class="petal p1"></span>
        <span class="petal p2"></span>
        <span class="petal p3"></span>
        <span class="petal p4"></span>
        <span class="center"></span>
      </div>
    </div>

    <div class="flower">
      <div class="stem"></div>
      <span class="leaf left"></span>
      <span class="leaf right"></span>
      <div class="head">
        <span class="petal p1"></span>
        <span class="petal p2"></span>
        <span class="petal p3"></span>
        <span class="petal p4"></span>
        <span class="center"></span>
      </div>
    </div>

    <div class="flower">
      <div class="stem"></div>
      <span class="leaf left"></span>
      <span class="leaf right"></span>
      <div class="head">
        <span class="petal p1"></span>
        <span class="petal p2"></span>
        <span class="petal p3"></span>
        <span class="petal p4"></span>
        <span class="center"></span>
      </div>
    </div>

    <div class="flower">
      <div class="stem"></div>
      <span class="leaf left"></span>
      <span class="leaf right"></span>
      <div class="head">
        <span class="petal p1"></span>
        <span class="petal p2"></span>
        <span class="petal p3"></span>
        <span class="petal p4"></span>
        <span class="center"></span>
      </div>
    </div>

    <div class="flower">
      <div class="stem"></div>
      <span class="leaf left"></span>
      <span class="leaf right"></span>
      <div class="head">
        <span class="petal p1"></span>
        <span class="petal p2"></span>
        <span class="petal p3"></span>
        <span class="petal p4"></span>
        <span class="center"></span>
      </div>
    </div>

    <span class="grass"></span>
    <span class="grass"></span>
    <span class="grass"></span>
    <span class="grass"></span>
    <span class="grass"></span>
  </div>

  <p class="message">
    May your Eid bloom with happiness, love, smiles, and endless blessings.
  </p>

  <a href="#" class="next-btn">Next ➜</a>

  <script>
    for (let i = 0; i < 28; i++) {
      const spark = document.createElement("span");
      spark.className = "spark";
      spark.style.left = Math.random() * 100 + "vw";
      spark.style.top = Math.random() * 100 + "vh";
      spark.style.animationDelay = Math.random() * 3 + "s";
      document.body.appendChild(spark);
    }
  </script>

</body>
</html>
