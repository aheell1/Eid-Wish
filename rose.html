<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --background-color: #0B1026;
      --contrast-color: #F6C453;
      --pink: #ff5f9e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(246, 196, 83, 0.08), transparent 35%),
        var(--background-color);
      font-family: "Poppins", sans-serif;
      color: white;
      position: relative;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 25px 20px;
      position: relative;
      z-index: 5;
      transform: translateY(-30px);
    }

    h1 {
      font-family: "Great Vibes", cursive;
      font-size: clamp(3.2rem, 9vw, 6.2rem);
      color: var(--contrast-color);
      font-weight: 400;
      text-shadow: 0 0 18px rgba(246, 196, 83, 0.65);
      margin-bottom: 24px;
    }

    .rose-card {
      padding: 14px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(246, 196, 83, 0.45);
      box-shadow:
        0 0 25px rgba(246, 196, 83, 0.2),
        0 18px 40px rgba(0, 0, 0, 0.4);
      animation: roseMove 4s ease-in-out infinite;
    }

    .real-rose {
      width: 250px;
      max-width: 72vw;
      border-radius: 22px;
      display: block;
      filter:
        saturate(1.2)
        contrast(1.05)
        drop-shadow(0 0 18px rgba(255, 95, 158, 0.4));
    }

    .message {
      max-width: 520px;
      font-size: clamp(1rem, 3vw, 1.25rem);
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.9);
      margin-top: 26px;
    }

    .falling-petal {
      position: absolute;
      top: -40px;
      width: 13px;
      height: 19px;
      background:
        radial-gradient(circle at 35% 25%, #ffc2d1, #ff5f9e 55%, #b5174b);
      border-radius: 70% 30% 70% 30%;
      opacity: 0.75;
      animation: fallPetal linear infinite;
      z-index: 1;
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--contrast-color);
      border-radius: 50%;
      opacity: 0.5;
      animation: sparkle 2s ease-in-out infinite;
      z-index: 1;
    }

    .next-btn {
      position: fixed;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      border: 1.5px solid var(--contrast-color);
      border-radius: 18px;
      background: rgba(246, 196, 83, 0.12);
      color: var(--contrast-color);
      font-family: "Amiri", serif;
      font-size: 0.95rem;
      text-decoration: none;
      box-shadow: 0 0 12px rgba(246, 196, 83, 0.3);
      transition: 0.3s ease;
      z-index: 10;
    }

    .next-btn:hover {
      background: var(--contrast-color);
      color: var(--background-color);
      transform: translateX(-50%) scale(1.06);
      box-shadow: 0 0 22px rgba(246, 196, 83, 0.7);
    }

    @keyframes roseMove {
      0%, 100% {
        transform: translateY(0) rotate(-1deg) scale(1);
      }

      50% {
        transform: translateY(-12px) rotate(1deg) scale(1.03);
      }
    }

    @keyframes fallPetal {
      0% {
        transform: translateY(-50px) translateX(0) rotate(0deg);
        opacity: 0;
      }

      12% {
        opacity: 0.85;
      }

      100% {
        transform: translateY(110vh) translateX(45px) rotate(260deg);
        opacity: 0;
      }
    }

    @keyframes sparkle {
      0%, 100% {
        opacity: 0.2;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.8);
      }
    }

    @media (max-width: 600px) {
      .page {
        transform: translateY(-55px);
      }

      h1 {
        font-size: clamp(3rem, 15vw, 4.4rem);
        margin-bottom: 18px;
      }

      .rose-card {
        padding: 10px;
        border-radius: 22px;
      }

      .real-rose {
        width: 210px;
        border-radius: 18px;
      }

      .message {
        max-width: 330px;
        font-size: 0.92rem;
        margin-top: 22px;
      }

      .next-btn {
        bottom: 70px;
        font-size: 0.85rem;
        padding: 7px 16px;
      }
    }
  </style>
</head>

<body>

  <main class="page">
    <h1>For You</h1>

    <div class="rose-card">
      <img src="rose.jpg" alt="Rose bouquet" class="real-rose">
    </div>

    <p class="message">
      May your Eid bloom with happiness, love, smiles, and endless blessings.
    </p>
  </main>

  <a href="#" class="next-btn">Next ➜</a>

  <script>
    for (let i = 0; i < 20; i++) {
      const petal = document.createElement("span");
      petal.classList.add("falling-petal");

      petal.style.left = Math.random() * 100 + "vw";
      petal.style.animationDuration = 7 + Math.random() * 5 + "s";
      petal.style.animationDelay = Math.random() * 6 + "s";
      petal.style.transform = "scale(" + (0.7 + Math.random() * 0.6) + ")";

      document.body.appendChild(petal);
    }

    for (let i = 0; i < 25; i++) {
      const sparkle = document.createElement("span");
      sparkle.classList.add("sparkle");

      sparkle.style.left = Math.random() * 100 + "vw";
      sparkle.style.top = Math.random() * 100 + "vh";
      sparkle.style.animationDelay = Math.random() * 3 + "s";

      document.body.appendChild(sparkle);
    }
  </script>

</body>
</html>
