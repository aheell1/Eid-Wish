<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Amiri:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0B1026;
      --gold: #F6C453;
      --pink1: #fff1f5;
      --pink2: #ffb3c7;
      --pink3: #ff6f9f;
      --pink4: #c9184a;
      --green1: #bbf7d0;
      --green2: #22c55e;
      --green3: #14532d;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 75%, rgba(246,196,83,.13), transparent 24%),
        radial-gradient(circle at center, #111936 0%, var(--bg) 55%, #030712 100%);
      font-family: sans-serif;
    }

    h1 {
      position: fixed;
      top: 35px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Great Vibes", cursive;
      font-size: clamp(3.2rem, 11vw, 5.8rem);
      color: var(--gold);
      font-weight: 400;
      text-shadow: 0 0 24px rgba(246,196,83,.8);
      z-index: 50;
      white-space: nowrap;
    }

    .garden {
      position: absolute;
      left: 50%;
      bottom: 82px;
      width: 430px;
      height: 420px;
      transform: translateX(-50%);
    }

    .soil-glow {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 360px;
      height: 62px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(246,196,83,.45), transparent 70%);
      filter: blur(9px);
    }

    .flower {
      position: absolute;
      bottom: 30px;
      width: 120px;
      transform-origin: bottom center;
      animation: sway 5s ease-in-out infinite;
    }

    .f1 { left: 155px; height: 305px; z-index: 5; }
    .f2 { left: 60px; height: 245px; scale: .82; z-index: 4; animation-delay: .4s; }
    .f3 { left: 270px; height: 250px; scale: .84; z-index: 4; animation-delay: .8s; }
    .f4 { left: 115px; height: 205px; scale: .68; z-index: 3; animation-delay: 1.1s; }
    .f5 { left: 230px; height: 215px; scale: .7; z-index: 3; animation-delay: 1.4s; }

    .stem {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 8px;
      height: 0;
      transform: translateX(-50%);
      background: linear-gradient(to right, var(--green3), var(--green2), var(--green1));
      border-radius: 40px;
      box-shadow: 0 0 12px rgba(80,220,130,.45);
      animation: growStem 1.5s ease forwards;
    }

    .head {
      position: absolute;
      top: -5px;
      left: 50%;
      width: 112px;
      height: 108px;
      transform: translateX(-50%) scale(0);
      animation: bloomHead .9s ease forwards;
      animation-delay: 1.35s;
      filter: drop-shadow(0 0 18px rgba(255,122,168,.8));
    }

    .petal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38px;
      height: 58px;
      margin-left: -19px;
      margin-top: -52px;
      background:
        radial-gradient(circle at 30% 18%, var(--pink1) 0 8%, var(--pink2) 22%, var(--pink3) 55%, var(--pink4) 100%);
      border-radius: 78% 22% 72% 28%;
      transform-origin: 50% 95%;
      opacity: 0;
      box-shadow:
        inset -7px -9px 13px rgba(120,0,45,.3),
        inset 5px 5px 11px rgba(255,255,255,.28);
      animation: openPetal .9s ease forwards;
    }

    .petal.outer { width: 42px; height: 64px; margin-left: -21px; margin-top: -57px; }
    .petal.mid { width: 34px; height: 52px; margin-left: -17px; margin-top: -45px; z-index: 4; }
    .petal.inner { width: 25px; height: 38px; margin-left: -12.5px; margin-top: -33px; z-index: 7; }

    .petal:nth-child(1) { --a: 0deg; --d: 30px; animation-delay: 1.55s; }
    .petal:nth-child(2) { --a: 36deg; --d: 31px; animation-delay: 1.65s; }
    .petal:nth-child(3) { --a: 72deg; --d: 30px; animation-delay: 1.75s; }
    .petal:nth-child(4) { --a: 108deg; --d: 31px; animation-delay: 1.85s; }
    .petal:nth-child(5) { --a: 144deg; --d: 30px; animation-delay: 1.95s; }
    .petal:nth-child(6) { --a: 180deg; --d: 31px; animation-delay: 2.05s; }
    .petal:nth-child(7) { --a: 216deg; --d: 30px; animation-delay: 2.15s; }
    .petal:nth-child(8) { --a: 252deg; --d: 31px; animation-delay: 2.25s; }
    .petal:nth-child(9) { --a: 288deg; --d: 30px; animation-delay: 2.35s; }
    .petal:nth-child(10) { --a: 324deg; --d: 31px; animation-delay: 2.45s; }

    .petal:nth-child(11) { --a: 25deg; --d: 18px; animation-delay: 2.15s; }
    .petal:nth-child(12) { --a: 95deg; --d: 18px; animation-delay: 2.25s; }
    .petal:nth-child(13) { --a: 165deg; --d: 18px; animation-delay: 2.35s; }
    .petal:nth-child(14) { --a: 235deg; --d: 18px; animation-delay: 2.45s; }
    .petal:nth-child(15) { --a: 305deg; --d: 18px; animation-delay: 2.55s; }

    .petal:nth-child(16) { --a: 55deg; --d: 8px; animation-delay: 2.55s; }
    .petal:nth-child(17) { --a: 175deg; --d: 8px; animation-delay: 2.65s; }
    .petal:nth-child(18) { --a: 295deg; --d: 8px; animation-delay: 2.75s; }

    .core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: radial-gradient(circle, #fff7fa, #ff7aa8 45%, #8f1234);
      box-shadow: 0 0 18px rgba(255,220,230,.8);
      z-index: 12;
      animation: coreShow .55s ease forwards;
      animation-delay: 2.85s;
    }

    .sepals {
      position: absolute;
      left: 50%;
      top: 92px;
      width: 60px;
      height: 24px;
      transform: translateX(-50%);
      z-index: 2;
    }

    .sepal {
      position: absolute;
      width: 14px;
      height: 34px;
      background: linear-gradient(var(--green1), var(--green3));
      border-radius: 80% 20% 80% 20%;
      transform-origin: top center;
    }

    .s1 { left: 23px; rotate: 0deg; }
    .s2 { left: 8px; rotate: -38deg; }
    .s3 { right: 8px; rotate: 38deg; }

    .leaf {
      position: absolute;
      width: 72px;
      height: 30px;
      background: linear-gradient(135deg, var(--green1), var(--green2), var(--green3));
      border-radius: 100% 0 100% 0;
      opacity: 0;
      box-shadow: inset -5px -5px 8px rgba(0,70,30,.32);
    }

    .leaf.l1 {
      left: 8px;
      bottom: 100px;
      transform-origin: right center;
      animation: leafLeft .8s ease forwards;
      animation-delay: 1s;
    }

    .leaf.l2 {
      right: 8px;
      bottom: 145px;
      transform-origin: left center;
      animation: leafRight .8s ease forwards;
      animation-delay: 1.2s;
    }

    .grass {
      position: absolute;
      bottom: 0;
      width: 7px;
      height: 0;
      background: linear-gradient(#bbf7d0, #22c55e, #14532d);
      border-radius: 100% 100% 0 0;
      transform-origin: bottom center;
      filter: drop-shadow(0 0 8px rgba(74,222,128,.55));
      animation: grassGrow 1.4s ease forwards;
    }

    .g1 { left: 20px; rotate: -24deg; animation-delay: .1s; }
    .g2 { left: 55px; rotate: 12deg; animation-delay: .2s; }
    .g3 { left: 90px; rotate: -10deg; animation-delay: .3s; }
    .g4 { left: 310px; rotate: 18deg; animation-delay: .25s; }
    .g5 { left: 345px; rotate: -14deg; animation-delay: .4s; }
    .g6 { left: 375px; rotate: 22deg; animation-delay: .5s; }

    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 14px var(--gold);
      animation: sparkle 2.6s ease-in-out infinite;
    }

    .next-btn {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 22px;
      border: 1.5px solid var(--gold);
      border-radius: 18px;
      background: rgba(246,196,83,.12);
      color: var(--gold);
      font-family: "Amiri", serif;
      font-size: .95rem;
      text-decoration: none;
      box-shadow: 0 0 13px rgba(246,196,83,.35);
      z-index: 60;
    }

    @keyframes growStem { to { height: 100%; } }
    @keyframes bloomHead { to { transform: translateX(-50%) scale(1); } }

    @keyframes openPetal {
      from {
        opacity: 0;
        transform: rotate(var(--a)) translateY(0) scale(.15);
      }
      to {
        opacity: 1;
        transform: rotate(var(--a)) translateY(var(--d)) scale(1);
      }
    }

    @keyframes coreShow { to { transform: translate(-50%, -50%) scale(1); } }

    @keyframes leafLeft {
      to { opacity: 1; transform: rotate(-32deg) scale(1); }
    }

    @keyframes leafRight {
      to { opacity: 1; transform: rotate(210deg) scale(1); }
    }

    @keyframes grassGrow { to { height: 125px; } }

    @keyframes sway {
      0%, 100% { rotate: -1.2deg; }
      50% { rotate: 1.3deg; }
    }

    @keyframes sparkle {
      0%, 100% { opacity: .2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.9); }
    }

    @media (max-width: 600px) {
      h1 {
        top: 42px;
        font-size: clamp(3rem, 15vw, 4.2rem);
      }

      .garden {
        width: 430px;
        height: 390px;
        bottom: 105px;
        transform: translateX(-50%) scale(.72);
      }

      .next-btn {
        bottom: 70px;
        font-size: .85rem;
        padding: 7px 17px;
      }
    }
  </style>
</head>

<body>

  <h1>For You</h1>

  <div class="garden">
    <div class="soil-glow"></div>

    <div class="flower f1">
      <div class="stem"></div><span class="leaf l1"></span><span class="leaf l2"></span>
      <div class="head">
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
        <div class="sepals"><span class="sepal s1"></span><span class="sepal s2"></span><span class="sepal s3"></span></div>
      </div>
    </div>

    <div class="flower f2">
      <div class="stem"></div><span class="leaf l1"></span><span class="leaf l2"></span>
      <div class="head">
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
        <div class="sepals"><span class="sepal s1"></span><span class="sepal s2"></span><span class="sepal s3"></span></div>
      </div>
    </div>

    <div class="flower f3">
      <div class="stem"></div><span class="leaf l1"></span><span class="leaf l2"></span>
      <div class="head">
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
        <div class="sepals"><span class="sepal s1"></span><span class="sepal s2"></span><span class="sepal s3"></span></div>
      </div>
    </div>

    <div class="flower f4">
      <div class="stem"></div><span class="leaf l1"></span><span class="leaf l2"></span>
      <div class="head">
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
        <div class="sepals"><span class="sepal s1"></span><span class="sepal s2"></span><span class="sepal s3"></span></div>
      </div>
    </div>

    <div class="flower f5">
      <div class="stem"></div><span class="leaf l1"></span><span class="leaf l2"></span>
      <div class="head">
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span><span class="petal outer"></span>
        <span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span><span class="petal mid"></span>
        <span class="petal inner"></span><span class="petal inner"></span><span class="petal inner"></span>
        <span class="core"></span>
        <div class="sepals"><span class="sepal s1"></span><span class="sepal s2"></span><span class="sepal s3"></span></div>
      </div>
    </div>

    <span class="grass g1"></span>
    <span class="grass g2"></span>
    <span class="grass g3"></span>
    <span class="grass g4"></span>
    <span class="grass g5"></span>
    <span class="grass g6"></span>
  </div>

  <a href="#" class="next-btn">Next ➜</a>

  <script>
    for (let i = 0; i < 34; i++) {
      const spark = document.createElement("span");
      spark.className = "spark";
      spark.style.left = Math.random() * 100 + "vw";
      spark.style.top = Math.random() * 100 + "vh";
      spark.style.animationDelay = Math.random() * 3 + "s";
      document.body.appendChild(spark);
    }
  </script>

</body>
</html>
