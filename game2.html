<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wazwan Kitchen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;1,400;1,600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:    #070f1e;
  --card:  #0f1c35;
  --gold:  #c9a84c;
  --glow:  #f5d06a;
  --dim:   #7a6228;
  --ivory: #f0ead8;
  --slate: #162440;
}

html,body{
  width:100%;min-height:100vh;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-family:'Lora',serif;
  overflow:hidden;
}

/* STARS */
#sc{position:fixed;inset:0;pointer-events:none;z-index:0}

/* CARD */
#card{
  position:relative;z-index:1;
  width:min(560px,95vw);
  background:linear-gradient(160deg,var(--card) 0%,#0a1628 100%);
  border:1.5px solid var(--dim);
  border-radius:22px;
  box-shadow:0 12px 60px rgba(0,0,0,.8),inset 0 0 60px rgba(201,168,76,.03);
  padding:22px 20px 20px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  user-select:none;
}

/* TITLE */
h1{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(15px,4vw,24px);
  color:var(--glow);
  text-shadow:0 0 20px rgba(245,208,106,.5);
  letter-spacing:.04em;
  text-align:center;
}

/* INSTRUCTION STRIP */
#hint{
  font-style:italic;
  font-size:clamp(11px,2.5vw,13px);
  color:var(--gold);
  text-align:center;
  min-height:18px;
  letter-spacing:.03em;
  transition:color .3s;
}
#hint.bad{color:#e05a2b}
#hint.ok{color:#7ecb7e}

/* STAGE */
#stage{
  position:relative;
  width:100%;
  height:clamp(180px,40vw,260px);
  background:linear-gradient(180deg,#060d1c 0%,#0c1830 70%,#0a1628 100%);
  border-radius:14px;
  border:1px solid var(--dim);
  overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;
  gap:clamp(6px,3vw,20px);
  padding-bottom:10px;
}

/* mountains */
#stage::before{
  content:'';
  position:absolute;inset:0;
  background:
    linear-gradient(to top right, transparent 60%, #0f1e38 60%) no-repeat bottom left / 35% 55%,
    linear-gradient(to top left,  transparent 55%, #0f1e38 55%) no-repeat bottom right/ 35% 55%,
    linear-gradient(to top,       transparent 50%, #0c1830 50%) no-repeat bottom center/50% 65%;
  pointer-events:none;
  opacity:.8;
}

/* STEP BUTTONS — the actual interactive areas */
.step-btn{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;
}
.step-btn .lbl{
  font-size:clamp(9px,2vw,11px);
  color:var(--gold);
  font-style:italic;
  text-shadow:0 1px 6px #000;
  text-align:center;
  line-height:1.3;
}
.step-btn svg{display:block;transition:transform .15s}
.step-btn:active svg{transform:scale(.93)}

/* big tap prompt ring */
.tap-ring{
  position:absolute;
  width:100%;height:100%;
  border-radius:50%;
  animation:ring 1.8s ease-out infinite;
  pointer-events:none;
  top:0;left:0;
}
@keyframes ring{0%{box-shadow:0 0 0 0 rgba(201,168,76,.5)}70%{box-shadow:0 0 0 14px rgba(201,168,76,0)}100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}}

/* steam */
#steam-wrap{
  position:absolute;
  bottom:calc(10px + clamp(70px,16vw,100px) + 18px);
  left:50%;transform:translateX(-50%);
  width:70px;height:60px;
  pointer-events:none;z-index:2;
  overflow:visible;
}

/* PROGRESS SECTION */
#bars{width:100%;display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-lbl{
  font-size:clamp(10px,2.2vw,12px);
  color:var(--gold);
  font-style:italic;
  white-space:nowrap;
  width:clamp(80px,22vw,100px);
  text-align:right;
}
.track{
  flex:1;height:11px;
  background:var(--slate);
  border-radius:99px;
  border:1.2px solid var(--dim);
  overflow:hidden;
}
.fill{
  height:100%;border-radius:99px;
  transition:width .18s ease;
}
#f-spice .fill{background:linear-gradient(90deg,#a0522d,var(--gold))}
#f-stir  .fill{background:linear-gradient(90deg,#5ba8d4,var(--glow))}
#f-cook  .fill{background:linear-gradient(90deg,var(--dim),var(--glow))}

/* CELEBRATE confetti layer */
#cflayer{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:10;
}

/* char animations */
@keyframes bounce {0%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}70%{transform:translateY(-4px)}}
@keyframes wiggle {0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
@keyframes jump   {0%,100%{transform:translateY(0)}30%{transform:translateY(-22px)}60%{transform:translateY(-8px)}}
@keyframes steam-up{0%{opacity:.7;transform:translateY(0) scaleX(1)}100%{opacity:0;transform:translateY(-55px) scaleX(1.5)}}
@keyframes pop-float{0%{opacity:1;transform:translateY(0) scale(.6)}40%{opacity:1;transform:translateY(-24px) scale(1.2)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}

/* ── POPUP ── */
#popup{
  display:none;
  position:fixed;inset:0;z-index:100;
  align-items:center;justify-content:center;
  background:rgba(4,9,20,.82);
  backdrop-filter:blur(6px);
}
#popup.show{display:flex}
#popup-box{
  background:linear-gradient(145deg,#111e38,#0a1628);
  border:2px solid var(--gold);
  border-radius:24px;
  padding:38px 36px 32px;
  max-width:min(420px,88vw);
  text-align:center;
  box-shadow:0 0 80px rgba(201,168,76,.25),0 20px 60px rgba(0,0,0,.7);
  display:flex;flex-direction:column;align-items:center;gap:16px;
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:scale(.6) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
#popup-pot{animation:jump .6s ease infinite}
#popup-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(18px,5vw,28px);
  color:var(--glow);
  text-shadow:0 0 24px rgba(245,208,106,.5);
}
#popup-msg{
  font-style:italic;
  font-size:clamp(14px,3.5vw,17px);
  color:var(--ivory);
  line-height:1.7;
}
#popup-hearts{font-size:28px;letter-spacing:6px}
#popup-btn{
  margin-top:4px;
  background:linear-gradient(135deg,var(--dim),var(--gold));
  border:none;border-radius:50px;
  padding:12px 36px;
  font-family:'Cinzel Decorative',serif;
  font-size:14px;
  color:#070f1e;
  cursor:pointer;
  letter-spacing:.06em;
  box-shadow:0 4px 20px rgba(201,168,76,.4);
  transition:transform .15s,box-shadow .15s;
}
#popup-btn:hover{transform:scale(1.05);box-shadow:0 6px 28px rgba(201,168,76,.6)}
</style>
</head>
<body>

<canvas id="sc"></canvas>

<div id="card">
  <h1>🍲 Wazwan Kitchen</h1>
  <div id="hint">Step 1 — Tap Aahil to grind the spices! 🌶️</div>

  <div id="stage">
    <div id="cflayer"></div>

    <!-- STEP 1: Spice Grinder character (left) -->
    <div class="step-btn" id="btn-spice" title="Tap to grind spices!">
      <div class="lbl">Tap me!<br>Grind Spices</div>
      <svg id="char1" width="75" height="95" viewBox="0 0 75 95" xmlns="http://www.w3.org/2000/svg">
        <!-- shadow --> <ellipse cx="37" cy="90" rx="18" ry="4" fill="rgba(0,0,0,.35)"/>
        <!-- legs --> <rect x="26" y="74" width="9" height="16" rx="4.5" fill="#e8e0cc" stroke="#1a1a1a" stroke-width="1.4"/>
        <rect x="40" y="74" width="9" height="16" rx="4.5" fill="#e8e0cc" stroke="#1a1a1a" stroke-width="1.4"/>
        <ellipse cx="30" cy="89" rx="7" ry="3.5" fill="#1a1a1a"/>
        <ellipse cx="44" cy="89" rx="7" ry="3.5" fill="#1a1a1a"/>
        <!-- pheran body --> <path d="M16 46 Q14 78 22 82 L53 82 Q61 78 59 46 Q51 40 37 39 Q23 40 16 46Z" fill="#f0ead8" stroke="#1a1a1a" stroke-width="1.4"/>
        <path d="M19 52 Q37 48 55 52" fill="none" stroke="#c9a84c" stroke-width=".9" opacity=".7"/>
        <!-- left arm (up, holding pestle) -->
        <path d="M18 52 Q8 44 6 32" fill="none" stroke="#e8e0cc" stroke-width="8" stroke-linecap="round"/>
        <path d="M18 52 Q8 44 6 32" fill="none" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>
        <!-- pestle --> <rect x="0" y="18" width="11" height="18" rx="5.5" fill="#1a1a1a"/>
        <rect x="-2" y="18" width="15" height="5" rx="2.5" fill="#1a1a1a"/>
        <!-- right arm --> <path d="M58 52 Q65 48 68 56" fill="none" stroke="#e8e0cc" stroke-width="8" stroke-linecap="round"/>
        <path d="M58 52 Q65 48 68 56" fill="none" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>
        <!-- head --> <circle cx="37" cy="28" r="20" fill="#f0ead8" stroke="#1a1a1a" stroke-width="1.6"/>
        <!-- hair --> <path d="M18 22 Q22 7 37 9 Q52 7 56 22 Q50 10 37 12 Q24 10 18 22Z" fill="#1a1a1a"/>
        <!-- headband --> <path d="M17 22 Q37 16 57 22" fill="none" stroke="#c9a84c" stroke-width="1.4" opacity=".8"/>
        <!-- eyes --> <ellipse cx="29" cy="28" rx="3.5" ry="4" fill="white" stroke="#1a1a1a" stroke-width=".9"/>
        <circle cx="30" cy="28" r="2.2" fill="#1a1a1a"/><circle cx="30.7" cy="26.8" r=".7" fill="white"/>
        <ellipse cx="45" cy="28" rx="3.5" ry="4" fill="white" stroke="#1a1a1a" stroke-width=".9"/>
        <circle cx="46" cy="28" r="2.2" fill="#1a1a1a"/><circle cx="46.7" cy="26.8" r=".7" fill="white"/>
        <!-- brows (determined) --> <path d="M26 22 Q29 20 32 22" fill="none" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M42 22 Q45 20 48 22" fill="none" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>
        <!-- smile --> <path d="M32 36 Q37 40 42 36" fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>
        <!-- cheeks --> <ellipse cx="24" cy="33" rx="4" ry="2.5" fill="rgba(201,168,76,.28)"/>
        <ellipse cx="50" cy="33" rx="4" ry="2.5" fill="rgba(201,168,76,.28)"/>
      </svg>
    </div>

    <!-- CENTER: Pot -->
    <div id="pot-wrap" style="position:relative;z-index:2;flex-shrink:0;display:flex;flex-direction:column;align-items:center;">
      <div id="steam-wrap"></div>
      <svg id="pot-svg" width="clamp(100px,25vw,140px)" height="clamp(80px,20vw,110px)"
           viewBox="0 0 140 110" xmlns="http://www.w3.org/2000/svg"
           style="width:clamp(100px,25vw,140px);height:auto">
        <!-- stove --> <rect x="5" y="92" width="130" height="14" rx="4" fill="#1a1a1a"/>
        <rect x="15" y="86" width="110" height="10" rx="3" fill="#252525"/>
        <!-- flames (always visible, opacity driven by JS) -->
        <g id="flames">
          <path d="M35 86 Q38 74 32 68 Q41 76 44 66 Q46 78 43 86Z" fill="#e05a2b" id="fl1" opacity=".9"/>
          <path d="M62 86 Q65 70 59 64 Q68 74 71 62 Q73 76 70 86Z" fill="#f5a623" id="fl2" opacity=".85"/>
          <path d="M88 86 Q91 74 85 68 Q94 76 97 66 Q99 78 96 86Z" fill="#e05a2b" id="fl3" opacity=".9"/>
        </g>
        <!-- pot body --> <path d="M20 44 Q17 88 22 90 L118 90 Q123 88 120 44Z" fill="#d4c9a8" stroke="#1a1a1a" stroke-width="2"/>
        <!-- rim --> <ellipse cx="70" cy="44" rx="51" ry="11" fill="#e8e0cc" stroke="#1a1a1a" stroke-width="2"/>
        <!-- handles --> <path d="M19 60 Q6 60 6 52 Q6 45 19 47" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <path d="M121 60 Q134 60 134 52 Q134 45 121 47" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <!-- decorative lines --> <path d="M24 60 Q70 55 116 60" fill="none" stroke="rgba(26,26,26,.18)" stroke-width="1"/>
        <path d="M22 72 Q70 67 118 72" fill="none" stroke="rgba(26,26,26,.18)" stroke-width="1"/>
        <!-- lid knob --> <rect x="64" y="30" width="12" height="10" rx="3" fill="#c9a84c" stroke="#1a1a1a" stroke-width="1.2"/>
        <ellipse cx="70" cy="30" rx="9" ry="5" fill="#c9a84c" stroke="#1a1a1a" stroke-width="1.2"/>
      </svg>
    </div>

    <!-- STEP 2: Stirrer character (right) -->
    <div class="step-btn" id="btn-stir" title="Hold to stir!">
      <div class="lbl">Hold me!<br>Stir the Pot</div>
      <svg id="char2" width="75" height="95" viewBox="0 0 75 95" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="37" cy="90" rx="18" ry="4" fill="rgba(0,0,0,.35)"/>
        <rect x="26" y="74" width="9" height="16" rx="4.5" fill="#e8e0cc" stroke="#1a1a1a" stroke-width="1.4"/>
        <rect x="40" y="74" width="9" height="16" rx="4.5" fill="#e8e0cc" stroke="#1a1a1a" stroke-width="1.4"/>
        <ellipse cx="30" cy="89" rx="7" ry="3.5" fill="#1a1a1a"/>
        <ellipse cx="44" cy="89" rx="7" ry="3.5" fill="#1a1a1a"/>
        <!-- pheran --> <path d="M16 46 Q14 78 22 82 L53 82 Q61 78 59 46 Q51 40 37 39 Q23 40 16 46Z" fill="#f0ead8" stroke="#1a1a1a" stroke-width="1.4"/>
        <path d="M19 52 Q37 48 55 52" fill="none" stroke="#c9a84c" stroke-width=".9" opacity=".7"/>
        <!-- left arm with ladle going toward pot --> <path d="M18 54 Q8 58 2 68" fill="none" stroke="#e8e0cc" stroke-width="8" stroke-linecap="round"/>
        <path d="M18 54 Q8 58 2 68" fill="none" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="2" y1="68" x2="-5" y2="80" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="-8" cy="83" rx="7" ry="4.5" fill="none" stroke="#1a1a1a" stroke-width="2"/>
        <!-- right arm up --> <path d="M58 52 Q68 46 72 40" fill="none" stroke="#e8e0cc" stroke-width="8" stroke-linecap="round"/>
        <path d="M58 52 Q68 46 72 40" fill="none" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>
        <!-- head --> <circle cx="37" cy="28" r="20" fill="#f0ead8" stroke="#1a1a1a" stroke-width="1.6"/>
        <!-- hair bun --> <path d="M18 22 Q22 7 37 9 Q52 7 56 22 Q50 10 37 12 Q24 10 18 22Z" fill="#1a1a1a"/>
        <ellipse cx="37" cy="9" rx="8" ry="6.5" fill="#1a1a1a"/>
        <path d="M29 9 Q37 4 45 9" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity=".6"/>
        <!-- happy crescent eyes --> <path d="M26 26 Q29 22 32 26" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M42 26 Q45 22 48 26" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
        <!-- nose --> <ellipse cx="37" cy="32" rx="2" ry="1.4" fill="rgba(26,26,26,.25)"/>
        <!-- big smile --> <path d="M31 37 Q37 43 43 37" fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/>
        <ellipse cx="25" cy="34" rx="4" ry="2.5" fill="rgba(201,168,76,.3)"/>
        <ellipse cx="49" cy="34" rx="4" ry="2.5" fill="rgba(201,168,76,.3)"/>
      </svg>
    </div>

  </div><!-- /stage -->

  <!-- BARS -->
  <div id="bars">
    <div class="bar-row" id="f-spice">
      <span class="bar-lbl">🌶️ Spices</span>
      <div class="track"><div class="fill" id="fill-spice" style="width:0%"></div></div>
    </div>
    <div class="bar-row" id="f-stir">
      <span class="bar-lbl">🥄 Stirring</span>
      <div class="track"><div class="fill" id="fill-stir" style="width:0%"></div></div>
    </div>
    <div class="bar-row" id="f-cook">
      <span class="bar-lbl">🍲 Cooking</span>
      <div class="track"><div class="fill" id="fill-cook" style="width:0%"></div></div>
    </div>
  </div>

</div><!-- /card -->

<!-- POPUP -->
<div id="popup">
  <div id="popup-box">
    <div id="popup-pot">
      <svg width="90" height="70" viewBox="0 0 140 110" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 44 Q17 88 22 90 L118 90 Q123 88 120 44Z" fill="#d4c9a8" stroke="#1a1a1a" stroke-width="2"/>
        <ellipse cx="70" cy="44" rx="51" ry="11" fill="#e8e0cc" stroke="#1a1a1a" stroke-width="2"/>
        <path d="M19 60 Q6 60 6 52 Q6 45 19 47" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <path d="M121 60 Q134 60 134 52 Q134 45 121 47" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
        <rect x="64" y="30" width="12" height="10" rx="3" fill="#c9a84c" stroke="#1a1a1a" stroke-width="1.2"/>
        <ellipse cx="70" cy="30" rx="9" ry="5" fill="#c9a84c" stroke="#1a1a1a" stroke-width="1.2"/>
        <!-- steam wisps on popup pot -->
        <path d="M45 44 Q42 34 46 26" fill="none" stroke="rgba(240,234,216,.6)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M70 43 Q66 30 71 20" fill="none" stroke="rgba(240,234,216,.5)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M95 44 Q92 34 96 26" fill="none" stroke="rgba(240,234,216,.6)" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div id="popup-title">Wazwan is Ready!</div>
    <div id="popup-hearts">🌹 💛 🌹</div>
    <div id="popup-msg">Let's have Wazwan together&nbsp;🍲<br><em>Nailla, Aahil, & Wazwan <3 </em></div>
    <button id="popup-btn" onclick="closePopup()">✨ Thank you! ✨</button>
  </div>
</div>

<script>
// ── STARS ──
(function(){
  const c=document.getElementById('sc'),ctx=c.getContext('2d');
  let st=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  function make(){st=[];for(let i=0;i<180;i++)st.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.3+.3,a:Math.random(),da:(Math.random()-.5)*.005});}
  function draw(){ctx.clearRect(0,0,c.width,c.height);for(const s of st){s.a=Math.max(.08,Math.min(1,s.a+s.da));if(s.a<=.08||s.a>=1)s.da*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(240,234,216,${s.a})`;ctx.fill();}requestAnimationFrame(draw);}
  window.addEventListener('resize',()=>{resize();make();});
  resize();make();draw();
})();

// ── GAME STATE ──
// 3 simple bars, all must hit 100 to win
// spice: click char1 → +8 each click (no decay — easy!)
// stir:  hold char2 → +5/tick (every 200ms)
// cook:  auto fills +3/tick once spice>=50 AND stir>=50

const s = {spice:0, stir:0, cook:0, done:false, stirHeld:false, step:1};

const char1   = document.getElementById('char1');
const char2   = document.getElementById('char2');
const btnSpice= document.getElementById('btn-spice');
const btnStir = document.getElementById('btn-stir');
const fSpice  = document.getElementById('fill-spice');
const fStir   = document.getElementById('fill-stir');
const fCook   = document.getElementById('fill-cook');
const hint    = document.getElementById('hint');
const cflayer = document.getElementById('cflayer');
const steamWrap=document.getElementById('steam-wrap');

// ── STEP LOGIC ──
// Step 1: spice up to 100 by clicking
// Step 2: stir up to 100 by holding
// Step 3: cooking auto-completes

function setHint(msg,cls=''){hint.textContent=msg;hint.className=cls;}

// ── TAP SPICE ──
function grindSpice(){
  if(s.done||s.step!==1) return;
  s.spice=Math.min(100,s.spice+8);
  // bounce char1
  char1.style.animation='none'; void char1.offsetWidth;
  char1.style.animation='bounce .35s ease both';
  setTimeout(()=>char1.style.animation='',400);
  updateBars();
  if(s.spice>=100){
    s.step=2;
    setHint('Step 2 — Hold Nailla to stir the pot! 🥄','ok');
    // glow ring on char2
    char2.parentElement.style.filter='drop-shadow(0 0 8px #f5d06a)';
  } else {
    const left=Math.ceil((100-s.spice)/8);
    setHint(`Keep grinding! ${left} more tap${left===1?'':'s'}! 🌶️`);
  }
}
btnSpice.addEventListener('click', grindSpice);
btnSpice.addEventListener('touchstart', e=>{e.preventDefault();grindSpice();},{passive:false});

// ── HOLD STIR ──
function startStir(){if(s.done||s.step!==2)return;s.stirHeld=true;char2.style.animation='wiggle .4s linear infinite';}
function stopStir(){s.stirHeld=false;if(!s.done)char2.style.animation='';}
btnStir.addEventListener('mousedown', startStir);
btnStir.addEventListener('mouseup',   stopStir);
btnStir.addEventListener('mouseleave',stopStir);
btnStir.addEventListener('touchstart',e=>{e.preventDefault();startStir();},{passive:false});
btnStir.addEventListener('touchend',  e=>{e.preventDefault();stopStir();},{passive:false});
btnStir.addEventListener('touchcancel',stopStir);

// ── STEAM ──
let steamTimer=null;
function spawnSteam(){
  const el=document.createElement('div');
  const x=10+Math.random()*50;
  el.style.cssText=`position:absolute;bottom:0;left:${x}px;width:${6+Math.random()*6}px;height:${20+Math.random()*20}px;background:rgba(240,234,216,.55);border-radius:50%;animation:steam-up 1.4s ease-out forwards;pointer-events:none;`;
  steamWrap.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}
function setSteam(on){
  if(steamTimer)clearInterval(steamTimer);
  if(on)steamTimer=setInterval(spawnSteam,250);
}
setSteam(true);

// ── CONFETTI ──
const EMOJIS=['❤️','⭐','✨','🌟','💛','🎊'];
function burst(){
  for(let i=0;i<24;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
      el.style.cssText=`position:absolute;left:${5+Math.random()*90}%;top:${10+Math.random()*80}%;font-size:${14+Math.random()*18}px;animation:pop-float ${.7+Math.random()*.8}s ease forwards;pointer-events:none;`;
      cflayer.appendChild(el);
      el.addEventListener('animationend',()=>el.remove());
    },i*60);
  }
}

// ── BARS ──
function updateBars(){
  fSpice.style.width=s.spice+'%';
  fStir.style.width=s.stir+'%';
  fCook.style.width=s.cook+'%';
}

// ── GAME LOOP (200ms ticks) ──
setInterval(()=>{
  if(s.done)return;

  // Step 2: stir filling
  if(s.stirHeld && s.step===2){
    s.stir=Math.min(100,s.stir+5);
    if(s.stir>=100){
      s.step=3;
      s.stirHeld=false;
      char2.style.animation='';
      char2.parentElement.style.filter='';
      setHint('Step 3 — Watch the Wazwan cook! 🍲','ok');
    } else {
      const left=Math.ceil((100-s.stir)/5);
      setHint(`Keep stirring! Almost there… (${s.stir}%) 🥄`);
    }
  }

  // Step 3: auto cook
  if(s.step===3){
    s.cook=Math.min(100,s.cook+3);
    const pct=s.cook;
    if(pct<40) setHint('Cooking slowly… the aroma is filling the kitchen 🌿');
    else if(pct<75) setHint('Looking gorgeous! Almost ready… 😍');
    else setHint('Nearly done! The whole family is waiting! 🏠','ok');
    if(s.cook>=100) win();
  }

  updateBars();
},200);

// ── WIN ──
function win(){
  s.done=true;
  burst();
  char1.style.animation='jump .5s ease infinite';
  char2.style.animation='jump .5s ease .15s infinite';
  setSteam(true); // keep steam going
  // flash pot gold
  document.getElementById('pot-svg').style.filter='drop-shadow(0 0 18px rgba(245,208,106,.7))';
  setTimeout(()=>{
    document.getElementById('popup').classList.add('show');
  },1600);
}

function closePopup(){
  document.getElementById('popup').classList.remove('show');
}
</script>
